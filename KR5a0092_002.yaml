front:
  text: 元始無量度人上品妙經注解卷中往二
  hash: sha256:d2cbe11faca1a3c0ede9329d40a6d3a6d49714b010a779386f1b600b2cd6e9e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0092_HFL_002-001a, image: hfl/0045/0045-098.png}
body:
  text: 上陽子陳觀吾注上陽子曰經者道也敬也道則尊之而行敬則守之勿失世知所敬者三寶也夫三寶實妙道之宗以道用釋則曰身中三寶以世法釋則曰教中三寶其身中三寶有二事也曰教中三寶有二説也今言教中三寶曰道經師三寶有今科古科三寶此二説也道乃元始玄一之祖氣以生天地人物是為道寶經乃玉晨道君演元始玄一之道為萬世梯筏是為經寶師則老君降授張天師經籙以傳世流教是為師寶教之源流實遵天師而亦有二説也故教中以前三寶為今科以後三寶為古科而其號稱亦異此世法化俗之説若言道用則是身中三寶有二事也元始玄一至真之精曰天寶亦曰道寶上清金液先天之氣曰靈寶亦曰經寶混元無極至真之神曰神寶亦曰法寶此身中之三寶非此三寶不能還丹不能做佛不能成仙而三寶大有金書言天寶靈寶神寶皆分氣而化亦身中之三寶若論還丹金液之道則身中三寶又有二説神氣精為內三寶耳目口為外三寶能尊其外三寶而不妄動則內三寶方結還丹而成胎嬰也故夫真文寶符龍章鳳篆玉笈金書三洞奧典三十六部萬八千篇皆出於三寶中曰經所以經即丹也即先天之一氣也此度人經乃玉晨道君演元始之道以授玄一真人玄一授天真皇人天真皇人依道君所傳書而成文以為經故每章以道言置首唯本章與玉曆二章不題道言乃皇人直以元始之道而書之然皆道君之所授今人以有道言者為序無道言者為經非也有誦二章而不誦前經者尤非也前標太上洞玄靈寶無量度人上品妙經者皇人所標也此則直標元始無量度人上品妙經者道君所標也然經之源流所傳亦别而諸經皆出於道君故道君為經寶經體道而行道因經而用若論金液還丹則經先丹而行丹後經而用借經表丹則曰先天無上靈寶九還金丹假道説經則曰元始無量度人上品妙經頌曰元始先天神氣精玄功無量最神靈度人度我須人度上品丹方是妙經元始洞玄靈寶本章上品妙首十回度人百魔隱韻離合自然混洞赤文無無上真元始祖劫化生諸天開明三景是為天根上無復祖唯道為身五文開廓普植神靈無文不光無文不明無文不立無文不成無文不度無文不生是為大梵天中之天鬱羅蕭臺玉山上京上極無上大羅玉清渺渺劫仞若亡若存三華離便大有妙庭金闕玉房森羅淨霐大行梵氣周回十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益算度厄尊神回骸起死無量度人今日校録諸天臨軒上陽子曰此章渾是道用元始太極未分先天之祖氣洞玄三洞玄奧萬法之真宗靈寶本章性也有也體也命之應也玄之根也老子曰有物混成先天地生是以能生物生人也上品妙首命也無也用也性之應也牝之門也紫陽真人曰白虎首經至寶華池神水真經以其能生佛生仙也回者復也還也在經則曰十回度人在丹則曰九還金丹此經所以為三洞之冠者在一度字也求仙作佛必先明度字方能復此元陽真氣以結還丹百魔隱韻身中六根入識三魂七魄三部八景二十四神未知行道之人皆為其汨亂心君引歸欲界故曰百魔今既修煉太丹則百魔受制更無惱試離合自然蓋還丹之道雖曰有為而非強為一離一合皆出造化之自然悟真篇曰二物會時情性合五行全處虎龍蟠者此也混洞赤文即本來之真性不壞之元神青元真人曰元為萬物之根立乎大象之首蓮化而無窮始為恍惚之初在乎萬化之先獨尊而變遷洞玄洞觀玄一化度天人靈寶在天曰靈在世曰寶本章具載修真合道之本上品獨得其玄方便設教妙首衆妙之首萬法之宗天地虛妙而清陰陽同妙而純日月含妙而明五行合妙而精萬物盡妙而真內義曰上品妙首金液還丹無上妙道之冠十回度人十月之功度世為仙百魔隱韻丹之異名離合自然喻金木間隔復能互並水火相剋復成既濟自然而成造化混洞赤文萬物之本源衆生之真性一氣之徂萬神所宗西升經曰虛無生自然自然成大道夫道者無形無體即先天一氣而化生萬物為天地造化之本修金丹者體循造化以虛無自然先天真一之氣名曰空氣金胎生金母而作丹基此氣父母未交之前與混沌同體故曰混洞父母媾精之後此氣欻然感附謂之陽精喻為銀礦名曰元神藏在坤宫故謂之性即本來面目未生之前謂之陰金已生之後謂之陽鉛是為五金之母參同契曰徑指天地之靈根將為藥祖明示陰陽之聖母用作丹基天地混沌之先此氣結而成玉字故曰赤文乃無上可上至真妙道故曰無無上真也元始祖劫化生諸天元氣始氣於徂劫初化分三氣而生三天曰清微天禹餘天太赤天三天之氣化分九氣而生九天曰始青天青元天始丹天太丹天始素天大素天始玄天大玄天青微天九天梵氣化分而生九霄九天曰大霄暉明流光素景天青霄元真寶曜天碧霄總生開靈傳道天絳霄太平應化道主天丹霄中極至妙變空天玉霄皓元威德耀晶天琅霄飛青元關傳濟天紫霄合景雙闕化身天神霄玉清妙景大有天九霄梵氣化分下生九天即生神九天一南方鬱單無量天二西北襌善無量壽天三東方梵監須延天四西南寂然兜術天五東南波羅尼密不驕樂天六北方洞元化應聲天七西方靈化梵輔天八東北高虛清明天九中央無想無結無愛天又生大羅上清玉真三十六天下生四種民天種民天之下一百三十五萬八千里生無色界四天無色界之下三十六萬里生色界一十八天色界之內有輕塵六天細塵六天粗塵六天色界之下三十萬里生欲界六天欲界之下五百二十億萬里化生五億諸天八圓世界四種民天之上布日月星辰主持萬物故曰開明三景人之生亦類是也父精母血包于母腹精血未凝如珠似露凝結之後生形五瓣頭與四肢男子先生左腎次右命門女則反是本性繼種於兩賢之間妙化之氣自然生發次則上生兩瞳神水以至化生五臟六腑九竅百脈筋骨齒髮氣足形金脫胎而生故老君曰天地媾精陰陽布化一月為胞精血凝也二月為胎形兆胚也三月陽神為三魂動以生也四月陰靈為七魄靜鎮形也五月五行分五臟以安神也六月六律定六腑用資靈也七月七精開七竅通光明也八月八景神具降真靈也九月宫室羅布以定精也十月氣足萬象成也故神布氣滿三萬六千關節根源本始一時生神此為化生諸天開明三景是為天根本起經曰夫道得三乃成故三合成德道不滿三諸事不成以內言之則曰鉛汞砂直指其物則我真性並日用妙化陰陽二氣合而成三上無復徂唯道為身老君化胡經曰道者元氣虛無天地從之而生萬物資之而形皆徂氣之妙化在道則曰金丹故曰上無復祖唯道為身也五文開廓普植神靈在丹則一氣復而變造五行五行具而成金胎在經則玉字出而結為赤文五文具而植神靈五行者鉛汞砂銀土天一生水坎中藏鉛地二生火離中産砂天三生木震龍主汞地四生金兊虎體銀天五生土中宫結丹道非此不光文非此不明身非此不立丹非此不成氣非此不度藥非此不生是為大梵天中之天大梵者先天氣凝而五行大備天中之天者身中有身也鬱羅蕭臺腦際也玉山上京泥丸也上極無上泥丸之上大羅玉清太玄也太玄內祕一機名日月高奔神化脫胎之要黃庭經曰高奔日月吾上道乃見玉清虛無老渺渺劫仞至高至尊若亡若存即張真人云視之不可見其形及至呼之又却譍三華離便頂顛屬南南本三數頂為華蓋又曰圓蓋南屬離離為午位三華為金華玉華九華內丹已結而頂有三華大有妙庭即上丹田乃百關總會之穴金闕玉房日宫為金闕左目也月宫為玉房右目也森羅星宿也言日月星宿列布而一身九竅露澄大行梵氣即先天妙氣周回十方言妙氣營衛金胎神室溫養大丹如上皆道用略注尚有至妙之妙心傳方可內景既露外景須明今復釋以世法庶幾賢愚各具眼目也混洞赤文自混沌之氣結而成赤文文字既出而妙經行妙經行則祖氣具在人身散分于物類之內是曰無無上真之謂也元始祖劫化生諸天元始以道祖而鎮大劫以祖氣而化生諸天祖氣分三氣而隸大羅三清之界故曰開明三景要知此氣遇大劫而不壞故曰是為天根此氣即太極之始氣而生天生地生五行生人物已故曰上無復祖道之在人身亦猶氣之在天地間故曰唯道為身赤丈立而五文開廓經法行而普植神靈世無經文則不能光明不能成立不能自度自生是經為大梵極品之音天中之天即三清大羅聖境大者覆蓋萬天羅者包羅三界中有玉京山周回八萬里下與昆崘對立山有鬱羅蕭臺臺有七寶城上極無上有玉清殿又有三華離便之宫大有妙庭皆天尊宴息之所金闕玉房瑶池翠水森森列布皆憑梵氣周回運轉故得久而長存此中有度人不死之神即元始分化之號南極長生君即朱陵大帝治太微垣司火煉之事度世君主陽九百六之變司馬君主滅邪却試好生君即青華之别名主詮校韓君主南昌品秩學人司命司録主功過豫奪延壽益算主增注年命度厄尊神主消平厄難回骸起死君主升度死魂飛尸登晨今天尊説法臨集帝軒校圖檢録品度學人如人身與玉京無異金闕玉房丹田泥丸冥然列布若一身神氣充滿則長生不死之神居其中亦如玉京之梵氣周回而無壞頌曰玉京山上鬱羅臺上品經詮演十回普植神靈行梵氣三華離便五爻開東方無極飛天神玉長生大聖無量度人南方無極飛天神王長生大聖無量度人西方無極飛天神王長生大聖無量度人北方無極飛天神王長生大聖無量度人東北無極飛天神玉長生大聖無量度人東南無極飛天神王長生大聖無量度人西南無極飛天神王長生大聖無量度人西北無極飛天神王長生大聖無量度人上方無極飛天神王長生大聖無量度人下方無極飛天神王長生大聖無量度人十方至真飛天神王長生度世無量大神並乘飛雲丹輿緑輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈幡前嘯九鳳齊唱後吹八鸞同鳴師子白鶴嘯歌雍雍五老啓途群仙翼轅億乘萬騎浮空而來傾光回駕監頁度生上陽子曰十方飛天大聖皆元始道氣分形東方諱總南諱飛西諱雲北諱無鏡東北諱梵東南諱那郁西南諱度仙西北諱钁氣上方諱瑛下方諱落一曰十方長生大聖一曰十方救苦天尊奉元始命掌十方三界校量功德開度無量總括生死陶鑄學人藏經載八方諸天皆有無極大千世界東方無極諸天安大堂鄉大千納善世界南方無極諸天宛黎城境大千棄賢世界西方無極諸天福堂洲大千咸行世界北方無極諸天鬱單野大千清靜世界東北無極諸天福集都大千長安世界東南無極諸天元福田大千用賢世界西南無極諸天延福鄉大千仁靜世界西北無極諸天福德野大千延賢世界上方上清玉真三十六天玄都無極世界下方黃曾三十二天八圓無極世界無量大神主監得道長生度世之事青元真人曰輿輦輪蓋皆陽精之氣所成鳳鶴龍鸞乃陰精之氣所化上聖之人具真常之道呼吸合散隨意現前陰陽氣諧如歌似曲皆氣所為並非外物人若還丹功成陰魔亦化陽神元氣一呼萬神咸聽五臟神靈各隨方色自現輿輦儀衛來迎百骸衆神前導後從升舉朝元與此無異五老啓途東方青靈始老姓關諱開字靈威仰南方丹靈真老姓洞浮諱極炎字赤嫖弩中央元靈元老姓通班諱元氏字含樞紐西方皓靈皇老姓上金諱昌開宇曜魄寶北方五靈玄老姓黑節諱靈會字隱侯局十方大聖道位高尊乃感五老啓途而群仙翼轅億乘萬騎浮空而來然皆法身之神丹經有曰神御氣氣留形傾光回駕玉光飛雲回旋天尊之法座領監衆真較度君品以丹言則傾光回駕乃坎離既濟陰陽已交真神化生溫養胎室故曰監真度生頌曰無極天真集蘂宫丹與緣輦御浮空傾光回駕群仙慶陽長陰消妙化功諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天普告三界無極神鄉泉曲之府北都羅酆三官九署十二河源上解徂考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼群元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界道逼上清上清之天天帝玉真無色之境梵行上陽子曰此道用世法兩事俱明世法諸天丞相天天各有丞相一云即大羅神公南昌即丹天世界上宫即朱陵火府韓司宫中丈人即司命也主煉度文籍之事主録乃天中宰協特宸主録勒籍之司監生主生魂鑄魄也太上説經各持録籍齊到帝前校其應受度者或宿名玄圖骨相合仙或修齋奉戒功德積感或敬奉三寶善功徹天或供養師寶為三官所稱名在諸天者各為嚴行考校據功量品隨其高下應受升度也以道用則執籙把籍元始氣分而陰陽判三才既立而文籍生內義曰顯諸仁則為録籍藏諸用則為陰陽幽明無録籍功罪何所記天地無陰陽造化何由成故帝前印中宫神室帝之所御四海輻湊神之所舍萬氣混凝喻陰陽交會於中宫神室故曰執籙把籍齊到帝前天尊説經的非虛言欲人行其道耳修學之人且當改過遷善守戒防淫去詐息機清心寡欲嗟夫世人逐末忘本賤命輕身英雄豪傑者為功名所役聰明特達者為進取所羇衣食富足者為營計所籠貧窮困乏者為口體所纍其有出塵之士只樂逸豫以為清淨無為是修行誤矣何能得陰陽交會於神室哉隨所應度金丹之道要實工夫隨功受報十分工夫有十分受用一或滅裂其報亦滅裂雖所修至密所為莫知然渺渺大羅之天無不嚴校而紀録者普告三界欲界色界無色界亦天地水三界也無極神鄉十方無極世界亦三界神庭廟杜泉曲之府北有大海人身則號為泉曲其穢惡黑腥莫測邊際為江海之要府停録罪魂北都羅酆太極之初清氣上為圓蓋半清半濁之氣中為人物重濁之氣凝為羅酆在北陰之癸地高萬餘里周回數千里上參碧落下際風泉黑鬱之氣盤礴其中山有六洞宫一曰紂絶陰天宫二曰泰殺諒事宗天宫三曰明晨耐犯武城天宫四曰恬照罪氣天宫五曰宗靈七非天宫六曰敢司運宛屢天宫每宫各有魔王主之人能持此六官名常生敬畏者則魔王保舉削落罪名三官九署三官為三元上元在山之阿去天為近天官領之主校功録善升降品秩中元在山之左地官領之中有靈獄主治罪魂為追呼之府下元在山之右去風壘近水官主之下有九囚大獄寒冰之庭主治重罪鬼囚九署九壘土皇九令之司又有天上三官天官隸玉清境置三宫九府三十六曹官僚皆化氣為之總主上真玉虛高皇上帝諸天帝聖及世男女生命録籍罪福學道仙籍中元地官隸上清境置三宫九府四十二曹宫僚皆世人有功高德重者為之總主五嶽諸真得道神仙九地土皇八極諸靈官下元水府隸太清境置三宫九府四十二曹官僚皆世人積善建功者補充總主水帝河海九江水府及仙簿人民生死功過三元各有三宫九府為九署也十二河源一切水際分治罪魂之所天尊説經使為學人上解祖考億劫種親削除三惡罪根更不拘留乘元始九龍符命而升遷也北都寒池酆都洞陰之境有朔單鬱絶之都五氣天君主之九地之中北陰天君主之九水之中大溟水帝主之總號北都中有三界大魔五帝考官巨天力士勾校罪魂之神夫人生為陽魂死為陰魄若魂魄散亂莫可執持令其部衛形魂使不散壞乃得制魔保舉度品南宫度品者若積諸善根則受煉仙化若無功過受度人身若修行至經功滿則生身劫劫長存永度三塗一天塗色欲門上尸道二人塗愛欲門中尸道三地塗貪欲門下尸道此為在世三塗如地獄鬼趣傍生為陰界三塗也五苦者色纍苦心門愛纍苦神門貪纍苦形門華競苦精門身纍苦魂門夫學仙者被此三塗五苦所遏故云八難若能度之便超三界也若論還丹則普告三界三丹田也無極神鄉一身萬神之所泉曲之府即欲海也北都羅酆乃愛根也學人不去愛根則汨沒于欲海三官九署印身中三元九宫十二河源人身有十二愛河之源上解祖考人為妄想所迷嗜欲所汨昏濁沉滯不得清明如人租禰拘滯鬼群之化修煉者要萬氣朝生門百神守死户疾除罪簿頓除欲想落滅惡根永絶妄緣則出類拔萃更不逼合於鬼群元始符命即先天之真氣符竅也汞也陽中之陰龍之弦氣也命妙也鉛也陰中之陽虎之弦氣也經云常無欲以觀其妙常有欲以觀其竅故先哲云書符不知竅反被鬼神笑老子曰竅兮冥其中有精其精甚真其中有信此信即符信也此為元始符命其以元始真氣符合命門之祖氣何哉夫人之身稟元始祖氣而生至于盛壯蹶趨於醉夢之場而此氣奔失若修行人先煉陽中之陰以留真汞次煉陰中之陽以求真鉛一時刻中凝結成丹則可覬升遷矣北都即性根蕃生真汞寒池印命門蕃生真鉛當此鉛汞交姤性命混融直須把握一念部衛形魂若形全魂復脈住氣停還丹始結故能制魔保舉度品南宫所謂枯稿形骸將死之魂受此鉛火煉度得神仙妙化之道以成真人矣生身受度天尊顯此一句證出還丹之旨蓋此經非只為死者言乃修行人生身受此真氣以度且生身則陰陽可全而造化可掬學人能以有生之身倒用五行修此大丹以成高仙則劫劫長存隨劫輪轉與天齊年永度八難之苦超欲界色界