嚴行攝起北都羅酆檢舉愛根以煉還丹庶令神公受命神公卽我元神號馬龍氏諱廓奕其禀受元始梵炁眞命一切掃去貪淫不祥之鬼八威吐毒八威乃眼耳鼻舌身意六識并含藏傳送爲八識號曰八威吐去色聲香味觸法之毒害不令惱亂然後金剛神王駕猛馬以四張遣天丁前驅勇猛而進飭大帥仗旛堅固而行擲火萬里則光爍爍流鈴八衝則圓陀陀彼四帝諸天若稍有干試拒上天度人之道遏元始一炁之眞使不能還元則金剛神王以金鉞而前戮巨天力士仗巨戈而後刑屠割五濁之淫鬼急如風火以无停蓋半時之功要疾速之意千千截首千妖屏迹萬萬剪形萬怪逃形彼无干試違犯三官三元也北酆眞性也則三元專制眞性洞明檢按鬼妖營窟不得容隱元始梵炁金馬黃道也驛程急遞也使此炁馳逐黃道而歸神室普告无窮一炁所臨萬神聽令三界卽三田五帝卽五官皆列言奏功于上淸也以世法則如經所言不釋亦明頌曰赫奕威雄正令行魔無干犯鬼無精一些祖炁還丹就三界列言奏上淸元洞玉曆龍漢延康眇眇億劫混沌之中上无復色下无復淵風澤洞虛金剛乘天天上天下无幽无冥无形无影无極无窮溟涬大梵寥廓无光赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存梵炁彌羅萬範開張元綱流演三十二天輪轉无色周回十方旋斗歷箕回度五常三十五分總炁上元八景冥合炁入玄玄上陽子曰二章爲經之脉爲丹之髓何也本章是煉金液還丹事故示赤文爲釆藥之具十方浮空而來齊到帝前乃聚精會神至今日欣慶受度方乃合丹旣得一炁還元則身中五斗五帝效職驅邪逐去陰魔鬼炁故示萬萬剪形之功老子曰下德爲之而有以爲者本章之謂也此章是煉玉液大丹事故示玉曆爲紀元之始所以无幽无冥无形无影者蓋炁初回而未帖得元始梵炁安鎮則萬範開張以至萬炁齊仙也九品經曰昔混元溟涬諸天未分元始肇形五劫初化乃命梵元祖晨道君肇錄天元運乘五劫故元洞者以成祖炁玉曆者以紀天元自一炁化分三因成九若龍若蜒蟠曲九道漠漠无極總九陽祖炁之元太上乃運梵合炁開始靑天元祖炁故東方得九炁以分天境劫號龍漢南方得三炁以分天境劫號赤明中央得十二炁以分天境劫號上皇西方得七炁以分天境劫號延康北方得五炁以分天境劫號開皇五劫旣周昊天成象一炁混道八景流光八帝示形九霄分化結元洞五陽之炁爲玉曆乃命天眞皇人以玉曆紀元洞之初劫運流復之本天眞天民學仙功績升退之道靑元眞人曰天地生成始於龍漢終於延康幾成幾壞莫可億度故云眇眇每劫運壞天地蕩散山海消融物象一空无復形質唯元洞之炁混然不分沌然始構是云混沌當此之時暗包眞一之水而五行未胚上无色象下无淵極上風下澤空洞虛无金剛之炁乘載天根幽冥言隱顯形影言物象窮極言分際溟涬言曠蕩當其混沌之中天上天下隱顯曠蕩莫分物象分際未别唯大梵之炁寥廓未有光影及後金風炁摩而生火四象化合而生土博載天地長養萬物此謂三境高眞過度災劫乃比眾生沉滯生死輪轉无窮喻金丹返本如經劫運之難今幸梵炁還元尚无形象赤明開圖赤明元年玉曆定紀天地日月山川物象分判生長亦猶還丹之有位也四序推遷各得其所故曰運度自然亦猶還丹之元爲也元始安鎮敷落五篇元始觀梵炁結形刻玉成雲篆天章載妙元神眞道五者故云五篇悟其妙者入其妙悟其元者入其元悟其神者入其神悟其眞者入其眞悟其道者入其道故盡妙合元盡元合神盡神合眞盡眞合道字經火煉故云赤書八威龍文文列蒼龍巨虬金師麒麟白虎玄豹丹蛇巨獬之狀是云八威其文保制劫運使天長存也梵炁彌羅元炁所化曰梵炁先天地立爲大道根元始資之而御運天地賴之以生成彌覆三界羅絡諸天兩儀旣張物象咸布故云萬範開張梵炁爲元化之綱流演於三十二天如輪運轉從無色界周回十方自斗至箕回度五常以日月五星合二十八宿故云三十五分總受高上天元之炁八景冥然交合以成玄功故云炁入玄玄皆喻還丹將結胎嬰也頌曰无形无影卻尋踪一炁周回顯聖功最是金丹靈妙處開張萬範廣神通玄中太皇上帝高眞汎景太霞嘯詠洞章金眞朗郁流響雲營玉音攝炁靈風聚烟紫虛鬱秀輔翼萬仙千和萬合自然成眞眞中有神長生大君无英公子白元尊神太乙司命桃康合延執符把籙保命生根上遊上淸出入華房八冥之内細微之中下鎭人身泥丸絳宫中理五炁混合百神十轉回靈萬炁齊仙仙道貴生无量度人上開八門飛天法輪罪福禁戒宿命因縁普受開度死魂生身身得受生上聞諸天諸天之上各有生門上陽子曰此明金丹道用玄中天心也卽人身正中之心太皇元始也卽祖炁曰道寶上帝道君也卽金母曰經寶高眞老君也卽丹體曰法寶是爲一體三寶釋云淸淨法身是性圓滿報身是智千百億化身是行性與命合陰慘陽舒汎景太霞嘯詠洞章梵炁始生汎然涵泳于元和之中金公乍還快暢嘯詠於洞章之句金眞朗郁金炁周行流響雲營炁營鄞鄂玉音攝炁玉液煎鉛靈風聚煙鉛爲汞制紫虛鬱秀汞結紫花輔翼萬仙功行外備千和萬合煉成一塊自然成眞胎嬰已成眞中有神胎已凝神長生主心无英主肝白元主肺太乙主頭司命主神桃康主脾合延主腎執符把籙煉炁合神上遊上淸梵炁上行出入華房自頂至踵頭有三華之庭體有曲密之房八冥之内皆炁通行細微之中无所不至下鎭人身升泥丸下絳宫中理五炁住黃庭合百神十轉而百靈回我十月而萬炁齊仙身外有身眞人出現仙道貴乎長生太上无量度人八門有長生之門法輪乃運轉之道凡世有罪福宿命仙家唯禁戒功縁形神普受開度死魂悉得生身此身得受長生姓名上聞諸天諸天校錄功行隨品定其生門功高則金闕侍宸行滿則上仙品級上陽子南嶽侍趙老師聞人誦度人經問曰何云金剛乘天師曰要莫糊塗你且從頭説來我先問你混洞赤文是何物就起揖問師曰我聞這四字便一身冷汗言下卽悟把此經一串透過師卻曰你知金剛乘天了也曰通身是汗師曰參須實叅悟須實悟更向上說句來曰如今超无色界了師鳴指一下曰如是如是這般話頭道是機鋒不怕罪福禁戒忒恁泄露經旨所恃將來過平育天魔王卻肯保舉也此經尊妙不可稱量故爲三洞上品道藏之首然體元始之意大槩唯欲存道説經以明道使人知敬此道出經以泄道欲人知行此道是道爲經之體經爲道之用因經顯道因道尋經世之凡夫聞經則敬聞道則笑遇經則琅琅而念誦聞道則成羣而毁謗只如道爲母經爲子世未有愛其子而詈其母也道之所以開天地揭日月施風雨役雷霆今人聞雷霆則掩耳聞道則非笑太上雖慈悲而不加譴然人之自取沉墜者爲當何如何謂道何謂經全陰陽造化者謂之道全性命體用者謂之經有陰而無陽不可以爲道有體而無用不可以爲經是道爲陰陽之根經乃性命之用以眞性合元命是配陰陽以外形合内神是全體用夫唯元始還丹之道與人受胎本同人受凡父母精血之初亦溟涬混沌而無形精血旣安一月爲胞二月成胎三月生魂四月定魄五月分五臟六月開六腑七月明七竅八月具八景九月相足十月氣全脱胎而生還丹之道正類是也其受靈父聖母妙氣之初必九和十合而金炁始來亦溟涬混沌洞虛寥廓无色无淵之可倚无形无影之可依元炁安鎮五行敷落彌羅周回冥然凝合汎嘯朗營復元歸空攝聚鬱輔含孕懷眞生五臟理五炁合百神結胎嬰號曰陽神出入神化但人受凡父母精血而生其質不靈金丹是靈父聖母之炁而毓能變化飛行是謂性命雙修形神俱妙頌曰混合百神賴此經此經尊妙甚分明天中梵炁胎嬰就萬炁齊仙步玉京中有空洞謠歌之章魔王靈篇辭參高眞第一欲界飛空之音人道眇眇仙道莽莽鬼道樂兮當人生門天道貴生鬼道貴終仙道常自吉鬼道常自凶高上淸靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人筭斷絶人命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆上陽子曰靈寶經法云洞章乃龜山丹黃飛玄紫文非魔王所爲尹眞人侍老君西遊龜臺入七寶園觀其文修之有法布此三章于世令人開悟超出三界昔天尊降魔魔王悉皆稽首受事乃勅魔王郁默統治欲界勅魔王摩羅統治色界勅魔王无明治无色界各歌謠章變化飛空警戒天人屏絶欲鬼令人聞此飛空之音轉色欲苦歸淸淨門自黃曾至摩夷爲欲界六欲俱淨則升色界人道眇眇微而陽失仙道莽莽高遠難明生門者生人生物之門成仙作佛之門鍾離眞人曰生我之門死我戸卽此門也爲人不悟則慾鬼當此之門爲樂天道好生爲貴而人苦趣鬼道高上淸靈爽高上之人心淸性靈其辭爽慨悲憫愚惑謠歌朗徹太空葛仙翁流珠歌曰流珠流珠役我區區忙忙汲汲忘寢失哺吾今六十憂赴三塗眞人度我要大丈夫諦觀斯語豈非悲歌朗太空者乎太上留經之意願世人修證仙道不欲人趨邪道而終窮也北都泉曲府世之慾海中有萬鬼群總皆色類若人耽迷則遏筭而絶命根學人爲阿人或居色界時歌洞章攝伏羅酆蓋北都羅酆乃人之慾根也慾根纔動羅酆起漫漫之黑雲六鬼交鋒妖精趲淋淋之苦雨學人到此要降伏之變欲界而爲長樂以煉還丹化鬼妖而爲諸天以施靈藥則金光之炁蕩蕩而我丹道日興隆矣頌曰伶俐惺惺日夜忙誰分地獄與天堂好將冷眼看浮世唤醒阿人歌洞章第二色界魔王之章落落高張明炁四騫梵行諸天周回十方无量大神皆由我身我有洞章萬徧成仙仙道貴度鬼道相連天地渺莽穢炁氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别眞我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故爲歌音自越行天至曇誓天共一十八天爲色界此天之人有形无欲分麤細輕一十八塵塵染俱淨升无色界落落高張色天遠大明炁四騫梵炁朗明无量大神我身魔試洞章萬徧結習皆忘仙道貴度出于色界鬼道欲人相連色界丹陽眞人東州富室日唯耽樂重陽祖師特徵度之一見卽曰我來扶醉人丹陽瞋曰如何是道曰五行不到處丹陽大悟從學登仙此豈非仙道貴度者乎天地渺莽色境何窮南華經云物來无窮我心有際穢炁氛氛結而不散三界樂兮過之長存過此色界超三界天升上淸境可以長存身度我界體入自然色超色類不爲所迷得大自在薄由我恩因經悟道龍漢蕩蕩眞偽莫分我界難度色相未除豈能度脫魔境故作洞章之文以相勉又變化飛空以魔試其間成者少敗懈退者多笑爾不能出此色境故爲歌謠此文也頌曰色界天中十八塵此心未淨卽非眞要知我界何難度度者如今有幾人第三无色界魔王歌曰三界之上眇眇大羅上无色根雲層峨峨唯有元始浩劫之家部制我界統乘玄都有過我界身入玉虛我位上王匡御眾魔空中萬變穢炁氛葩保眞者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何自皓庭至秀樂四天爲无色界太眞科曰无色界中至眞无情色欲俱空无復形質之患修至一天唯存心識以入炁觀炁觀道成上升一天又能去除心識以至无爲復升一天若萬法在心若有若无又升一天若炁觀轉妙結習都忘洞入自然卽升種民天也本際經曰煩惱爲結學業爲習結習已盡超種民位洞入道境隨炁升降災所不及也靑元眞人曰无色界中雖能離染忘色然未能遣忘尤以心識爲患故有穢炁氛葩則鬼道易爲邪入偶失制御卽墜色界直須忘心自遣觀空入妙老君經曰所空旣无无无亦无湛然常寂方是眞靜昔浪子劉長生眞人洛陽三年日唯觀空遣忘愛根纔動便乃誦曰北都泉曲府中有萬鬼郡但欲遏人筭斷絶人命門誦此謠章愛根斬然豈非阿人歌洞章以攝北羅酆者乎此爲眞實工夫所謂仙道貴實也世皆耽迷不樂仙道轉輪五苦須欲提拔復柰之何頌曰无色天中甚麼无這回心地莫糊塗他家不是閑花草要把眞身入玉虛此三界之上飛空之中魔王歌音音參洞章誦之百徧名度南宫誦之千徧魔王保迎萬徧道備飛升太空過度三界位登仙公有聞靈音魔王敬形勅制地祇侍衛送迎拔出地戸五苦八難七祖昇遷永離鬼官魂度朱陵受煉更生是謂无量普度无窮有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁三界之上无非魔王之所居飛空之中徧歌謠章以魔試能裨妙道故參洞章夫天尊説誦經曉世人以行道誦之百徧猶梵炁之初回是云名度南宫誦之千徧猶胎嬰之已結故云魔王保迎萬徧道備脫胎神化故云飛升太空此謂道備若不修道只誦萬徧以望飛升者亦難矣經功圓成過度三界還丹行滿位登仙公有聞靈音萬劫一遇魔王敬形道高德重勑制地祇勅乃梵炁地卽戊土流戊就已返本還元拔出地戸陰消陽長五苦八難超五行數除八識根永離鬼官陰絶坤戸魂度朱陵陽聚離宫有祕上天文凡學道之人覩經則寶愛而珍藏還丹則潛修而密鍊是謂之祕諸天共所崇丹道與經皆圓諸天共所崇仰何謂泄慢輕易妄爲有聞而不行或行而不祕皆受泄慢之禍恐墮地獄之中至於禍及祖翁卽是喪盡元炁卻怨丹經妄語又謂太上空言寧不回思自己妄爲泄慢之過也頌曰何故謠章參洞章只縁地獄與天堂儘知地獄惟心造好向天堂做一場道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言无韻麗曲无華宛故謂玄奥難可尋詳上天所寶祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寶質心依舊格告盟十天然後而付焉上陽子曰此經冠于諸經者首尾相應前後相隨故也如上卷乃天眞皇人筆錄玉晨道君序述元始天尊之説而萬世之下得此經誦之者猶如當時親睹其事斯爲妙也本章玉厯二章爲正經三界魔王歌章接于二章之後不屬正經以其文魔試學人之功爲多故參于元洞之末是云音參洞章也此下則天眞皇人又述道君之言耳此二章卽混洞赤文元洞玉曆二章混洞赤文明先天元始玄一之還丹元洞玉厯明後天无爲至眞之妙道言此二章獨掌不鳴並是諸天上帝无非一陰一陽至靈魔王全資神用隱祕之音玄關一竅大梵之言鉛銀砂汞在經則爲諸天帝魔之隱祕在丹則爲玄牝刀圭之梵言非世上常辭世上愚人開口談道且不知道爲何物亦不知物爲何用此謂非世上常辭也言无韻麗信言不美曲无華宛華則不實故謂玄奥顏閔雖慧莫猜難可尋詳黃老无師難悟上天所寶首經而已祕于天宫非世常用四萬劫一傳非人不可授至人者乃至聖之人也金寶質心以財易法夫金與寶世之所重愚人以金寶爲命勝人以功名爲命義士以名節爲命至人以道德爲命故至人煉金液九還神丹乃假金寶以爲法財有法无財事鮮克濟有財无法卽同愚人經法流通法財兩用依格告盟方可付强爲妄作事難全此道用之說也若論世法則未見以金寶爲質信而請經一卷者更四萬劫亦莫之有何以故彼安知是經有長生久視之道焉若言道用猶或有之何以故彼上根法器之士宿命因縁於丹經内默有所得未能深達玄旨忽聞此經妙諦必齎金寶信受不疑夫九還七返之方必外藥而合内藥若非金寶爲質則安能得此經之妙又安能伏虎以降龍又安能得先天之炁自虛无中來也凡今之世愚夫濁子一聞法財必爲大笑便謂修行者要徹骨貧一絲不掛只從事頑坐流于空寂渀蕩此輩直賺到老安知齎金寶以求妙經是法財兩用之旨希夷眞人入室詩曰入室何獨異金花日日開靈苗從地出香蘂向天來又云欲慕天中寶應須動世財蓬萊瑤洞裏醖就九還桮王鼎眞人曰凡俗欲求天上事尋時須用世間財蓋天中寶天上事是仙家密密運用之機卻非傍門採取之謬伐瑳迷伽承師教已問云何爲報師曰若辦五百羯利沙鉢那者足表深心爾時迷伽遍地尋覔旣具集已卽呈偈曰饒財多寶珍眷屬具成就必定於菩提常安住於法夫伐瑳迷伽爲天人師留此一偈與後來人證道作佛之眼目非同外道邪魔之行諦觀斯語則此經必金寶質心而後付方得其妙頌曰一些財利不關心金寶何爲度得人我是靑城親付屬還丹只要虎龍親
