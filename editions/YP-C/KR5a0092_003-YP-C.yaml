front:
  text: 元始无量度人上品妙經解註卷下道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此災同炁皆當齊心修齋六時行香十遍轉經福德立降消諸不祥无量之文普度无窮
  hash: sha256:0332172c6ef806ebc8d2c1ef725a28fc34ad702c60e59b430b5f4e911ed5f9be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0092_YP-C_02kangji-06-0074a, image: JY002/02kangji-06-0074a.png}
body:
  text: 上陽子曰天地運度以道用言則人之身得天地正中之炁頭像天足像地故曰人身一小天地夫天地之造化生人生物而人身之造化生佛生仙靈寶畢法曰道生萬物天地乃物中之大者人爲物中之靈者别求於道人同天地心比天腎比地肝爲陽肺爲陰一上一下仰觀俯察可以賾其機一始一終度數籌筭可以得其理易曰天尊地卑乾坤定矣老子曰有物混成先天地生吾不知其名强名之曰道張眞人曰甘露降時天地合黃芽生處坎離交先把乾坤爲鼎器次摶烏兔藥來烹故金丹以天地爲鼎器也世法則天地運度古人以一大爲天經云域中有四大道大天大地大王亦大渾天論天如鷄子地如中黃大地在天體之内天之南北兩極如門樞輪軸天旋一晝夜而周兩極不離元所其謂天如鷄子者鷄子形不正圓古人知天形相肖故以比之但喻地在天内天包地外而已縁督子曰天如繡毬内盛半毬水水上浮一板板比大地板上置諸物比人品萬類毬常旋轉板上諸物未嘗覺知天乃日夜旋轉地居其中人物在于地上安然不動此毬浮板之喻切幾之矣渾天論地在天體之内者天非可見其體因眾星出没東西管轄于兩極有常度無停機遂卽星所附麗擬爲天之體耳革象云天體圓如彈丸圓體中心六合之的也周圍上下相矩正等名曰天中天中直上至于天頂古者測景于陽城得天頂正中之景仰觀北極出地入地並三十六度是爲天中而非地中若論地維四方之中當以四海之至而求黃河之源爲崑崙是大地最高處西番指爲悶母黎山水分四向而流其山距東海不滿二萬里距西海三萬餘里陽城距東海近而距崑崙遠天下之地多西崑崙尚在東土要知大地之中乃在崑崙之西也渾天比天如鷄子者中黃爲地是地上天少地下天多革象乃云地上天多地下天少亦爲有理若論天之高下玉書云天地之間上下相去八萬四千里氣質不能相交天以乾索於坤而還於地中其陽負陰而升地以坤索於乾而還於天中其陰抱陽而降升降而運於道三五曆紀曰天地開闢陽淸爲天陰濁爲地盤古生于中神於天聖於地天極高地極深盤古極長後有三皇數起乎一立於三成於五盛於七處於九故天去地九萬里兩說相同則知地上至天九萬里地下亦九萬里是天之體中高十八萬里古以三百六十步爲一里如前本章化生諸天所註幾百幾十萬里者非實有其數比上根之士能絶欲樂卽同聖賢與彼下界之人相隔遠甚也如此又如地之寬闊自東海濱之西至西海濱之東五萬餘里海之闊又三萬里海之外二萬里則極東至極西通十五萬里徑與十八萬里之高則渾天謂形如鷄子者是矣天道左運周天三百六十五度餘四之一每晝夜一周遭无有窮已劉宋祖冲之善觀天文見極星去不動處一度餘蓋厯家測北極而知度數長短郭守敬行狀至元十六年守敬奏唐一行開元間令南宫說天下測景今疆宇比唐尤大若不遠方測驗日月交食分數時刻不同晝夜長短不同日月星辰去天高下不同卽目測驗人少可先南北立表取直測景世祖皇帝可其奏遂設監候官十四員分道而出先測得南海北極出地一十五度夏至景在表南長一尺一寸六分晝五十四刻夜四十六刻衡嶽北極出地二十五度夏至日在表端无景晝五十六刻夜四十四刻嶽臺北極出地三十五度夏至景在表北長一尺四寸八分晝六十刻夜四十刻和林北極出地四十五度夏至景長三尺二寸四分晝六十四刻夜三十六刻鐵勒北極出地五十五度夏至景長五尺一分晝七十刻夜三十刻北極出地六十五度夏至景長六尺七寸八分晝八十二刻夜十八刻革象謂朔方最遠之地煮羊胛未熟而天曉又遠去則日之出没只在須臾是爲天地運度也亦有否終有成數者必有否有定象者必有終金誥曰大道之中天地有高下之儀陰陽有始終之數唯金丹乃元始一炁變化无形无象超五行之外出象數之限立乎造化之表也日月五星以道用言備于一身經云人有七孔天有七星則七竅者日月五星也世法冲之始悟日有歲差之數劉洪始悟月行有遲疾張子信始悟五星行度縁督子曰日行不由黃赤道出入黃道内外晝長在赤道北日短在赤道南北有紫微垣帝座居之故北曰内南曰外又月有九行者只是一道月亦不由黃赤道其黃道與赤道如兩環相交而相距二十四度日月由中而行只距黃道六度日爲陽之精月受日光而明革象以黑漆毬於簷下映日其毬受日之光遠射暗壁月之圓體比黑漆毬有日映處則有光日映不到則无光故常一邊光一邊暗遇望日月相對月在天日在地下所映之光全向人間一邊暗處却全向天人所不見晦朔日月同經月在日之下月受日映一邊光處全向天一邊暗處全向地晦朔同經離二十五度所映之光漸向一邊人間乃見月吐微光日與月逐漸遠光漸多月離日九十餘度則人見光一半故謂之弦望後離日二十五度而月光漸虧逐漸遠光漸少而至于晦是以月體本无圓缺每受日光只是半輪以其旋轉人不盡見故言其虧盈也而愚者謂日月對望爲地所隔豈能得日之映彼豈知陰陽之氣隔礙潛通之理其月不全瑩而似瑕者其映水之處則瑩照地之處則瑕古云月中有山河樹影是也日之圓體大月之圓體小日距天雖遠月距天又遠月道在日道内亦似小環在大環之中月與人相近日與人較遠月因近視而比日體之大也太陽行一度曰一日而月一日行十三度有奇凡言度者日之圓徑數也如日之徑八百四十五里闊則一度亦八百四十五里闊故太陽三百六十五度餘計三十三萬里而天高遠於日故其度又闊於日之度以天三百六十五度餘計五十五萬餘里是天每度有一千三百九十里而月之度卻窄於日之徑月一度止得六百七十里周三百六十五度餘止計二十四萬里是月近於人天最遠於人唯日得其中道故凡厯測皆以日爲主而作準則也日行之道定二十八宿之名唐虞之際冬至日躔虛宿何以知其然在堯典曰日短星昴以正仲冬且冬至日短日入申末昴星見酉初時而在南方午上太陽卻在酉方虛屬天盤子以天盤子加臨地盤酉子加酉則酉必加午昴屬天盤酉而冬至見地盤午故冬至太陽躔虛夏至躔星春分在昴秋分在房古者唯以夜半中星攷其日度是以容成造曆車區占星是也漢作太初厯仲冬日在丑躔牽牛初堯至漢差一宫晉虞喜謂五十年差一度何承天謂百年差一度隋劉焯以七十五年差一度唐一行八十三年差一度大衍曆日在斗十三度宋乃以焯七十五年爲準至元十四年丁丑冬至日躔箕十度至元三年丁丑日躔箕八度則堯時日在子漢時日在丑金宋之間日在寅自堯至今三千七百年日已差三宫則堯之後九千餘年日反躔午一萬八千餘年日復躔子是帝堯之前亦必如此故李淳風以古厯章蔀紀元分度不齊始爲總法一行以朔有四大三小定九服交食之異徐昴以日食有氣刻時三差姚舜輔知食甚泛餘差數革象謂上古歲差少後世歲差多以唐宋到今驗之果符其説也古人以三百六十時有餘均作二氣六候爲一月然每月朔止得三百五十六箇時令三刻有奇而一氣則十五日有餘故月大曰氣盈月小曰虧名爲朔虛此謂日月五星亦有虧盈非但指日月晦食爲虧盈也又如五星亦因日而有遲留伏逆近日則疾遠日則遲遲甚而留留久而退初遲退漸疾退退最疾而復遲退如初退止而留留久而順行最疾則與太陽同躔歲星最疾四日行一度熒惑最疾七日行五度鎮星最疾七日行一度此三星比太陽行度較少故伏合以後太陽在前歲星距日十三度而晨見熒惑距日十九度而晨見鎮星距日十八度半而晨見大約近一遠二而留周天相半而退歲星初留約距日一百九度初退距日一百三十一度熒惑初留距日一百三十四度初退亦然鎮星初留距日九十四度初退距日一百二十八度凡退行最疾之時必與太陽對衝退止而留留久而順行太白最疾約四日行五度辰星最疾一日行二度太白距日遠不出四十度辰星距日遠不出二十四度距日遠則行遲距日近則行疾金木形體大故伏見與日近水火土形體小故伏見與日遠此五星之常數也至聖神人亦有休否夫舜有井廪之慮文王有羑里之囚周公居東二年孔子厄於陳蔡老君化胡而爲所難如來割肉以與賊徒豈非至聖神人亦有休否者乎末學之夫亦有疾傷士之學道而不勤行是爲末學之夫不勤則道不成道不成則疾患至矣凡有此災同氣皆當齊心修齋六時行香十遍轉經同氣卽同類也旣同其類必能齊心其心若齊方能辦事世人知看經而不知轉經看經者求福轉經者求丹經圓福至丹成德重故云福德立降此經多言无量之文普度无窮者意在經而主乎丹也夫元始梵炁還丹之道上根至士下及至愚小人但能信受而行皆躋聖位故云普度无窮頌曰有形有數有終窮直到无形體太空若問无形何所似全身放在黍珠中道言夫末學道淺或仙品未充運應滅度身經太陰臨過之時同學至人爲其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙上陽子曰此爲下士晩聞道者言也夫末學道淺仙品未充修學之人不能勇猛勤行而復年當遲暮精氣已衰不覺臘月三十夜到來无可奈何遂行奪舍投胎之法蓋奪舍與投胎乃是兩事此法雖屬傍門然得之者亦可以度其尸形使眞性不落于輪迴也若五祖之投周氏胎松精亦投金公室是也故云以度尸形如法然必得同學至人爲其護衛則魂神徑上南宫如四祖之題五祖洞賓之度松精此爲同學至人也隨其學功者蓋修學之士其功有深有淺故隨其功之深淺計日之遠近而更生雖經轉輪而眞性不滅待其金液大丹之道成是云便得神仙也頌曰計日更生隨學功功圓八百顯金容大羅天上風流好信道元來色卽空道言夫天地運終亦當修齋行香誦經星宿錯度日月失昏亦當修齋行香誦經四時失度陰陽不調亦當修齋行香誦經國主有災兵革四興亦當修齋行香誦經疫毒流行兆民死傷亦當修齋行香誦經師友命過亦當修齋行香誦經夫齋戒誦經功德甚重上消天災保鎮帝王下禳毒害以度兆民生死受賴其福難勝故曰无量普度天人上陽子曰天地運終以道用釋大修行人以天地而比一身還丹若成功行未積不能白日飛身乃厭塵世或欲示疾而去或欲蛻形而行或止得脫殼尸解之道皆謂之運終若直謂天地果然運終則民生其有幾何孰得而修齋行香又孰得而誦經乎星宿錯度日月失昏此乃身中神炁耗散耳目眩瞶蓋日月五星比人身之七竅也三光經云耳若亂聽聲色敗人眼若視惡眞光不明鼻若聞臭玉眞不淸口若雜味身多病生是故病從口入福從色敗子若戒之命同天在四時失度夫眞炁乖理則陰陽不調彭眞人曰陽火過刻水旱不調凝冬變爲大暑也陰符失節寒煖相侵盛夏反爲濃霜也金宫旣砂汞之不萌一鼎則蟲螟之互起大則山崩地圯金虎與木龍沸騰小則雨暴風飄坎男共離女奔逸内義曰太上所謂修齋行香誦經者卽虛心煉炁頤神養眞如上皆道用之謂若論世法天地運終則慾界六天大劫一交爲火所焚色界一十八天大劫一交爲水所漂无色界四天大劫一交爲風所壞此三界壞盡上帝乃於種民天選一人下世爲民種故曰種民天以此觀之則天地其有運終之時也星宿錯度日月失昏古人仰觀天象見眾星昏曉出没漸漸不同乃比天體如圓瓜以瓜有十二瓣周天三百六十五度餘四之一均作十二分則一瓣計三十度四十三分七十五杪度度皆輻輳於南北極猶其度歛尖於兩端最廣處在瓜之腰圍瓜腰一圍名曰赤道其度在赤道者正得一度之廣去赤道遠者漸遠漸窄雖有一度之名實無腰圍一度之廣各度皆以二十八宿之距星紀數謂之經度東西分經南北分緯經緯皆以二極遠近爲數兩極相距一百八十二度六十二分五十杪赤道横分與兩極相遠各九十一度三十一分二十五杪天頂名嵩高北極偏於嵩高而北者五十五度有奇南極偏於地中之下而南者亦五十五度有奇赤道則斜倚在嵩高之南三十六度兩傍乃正卯酉之位日月星宿不著於天乃假大化之炁懸空而行亦猶魚之不著於地乃假水之道而行于江河也北齊張子信仰觀歲久知五緯有盈縮之變遂加常數以求其逐日之躔蓋五緯不由黃道亦不由月之九道乃出入于黃道之内外五緯各自有道視太陽遠近而遲疾者如足力之有勤倦又有變數之加減者如路里之有曲直歲星加減最多處七度有餘熒惑二十五度餘土星八度餘太白四度餘辰星六度餘羅計氣孛所行无遲疾羅計從月交黃道而求月交之終始羅計於其間各逆行一度四十六分三十杪月孛從月之盈縮而求紫炁起於閏法二十八年十閏紫炁周十二宫紫炁卽景星也史註景星狀如半月凡見則人君有德明聖之慶星之留段是一日遶地一周與天同過一度行疾者反是遲行遲者反是疾退者反是疾之甚不及天行之數卽所行度日月相會同經度夫日食於朔者日月同經不同緯只合朔而不食若日月旣同經而月從八道穿度日之黃道而出入其時日亦在彼卽同經而又同緯則合朔而有食説者謂十曜之星皆能食日者非也日本无食但一時爲月之黑體所蔽障世以爲食然日體未嘗有損其所障有多少者蓋日道與月道相交有二若正會於交則月體全障日體人間暗甚謂之食旣若同經而在交之前後者亦見其食但正交則食分多交遠則食分少日月之行遲速不同須臾參差離交而光生矣夫月食於望者日月對躔爲望平分黃道之半黃道有二交若不當二交前後而望則不食若望在二交前後者月必食其食分多少當以距交遠近而推是時月在天日在地之下又非十曜之星所能食而月何以无光蓋縁月雖映日而明若在二交限内對經而又對緯至甚的切所受日光傷於大盛以致月反无光而黑爲其陽極反亢故也是爲月蝕今授時曆望在交之前後距交十三度餘則不食若在此限之内則有蝕矣故古人以日體對充之處名曰闇虛似乎日之像影月體因之失明故云闇日非有像影也强立其名故云虛言其非實有也若日月交朔於夜對望於晝者皆有食但已入地而人間所不見此謂日月失昏也亦當修齋行香誦經夫日陽月陰陽主德陰主刑而有國有家者日食則懼德之不修月食則懼刑之有失故日食修德月食修刑亦當修齋誦經以禳救之所謂救者觀乎天文以察時變預爲之儆戒耳四時失度陰陽不調以世法釋自古以分至爲春夏秋冬四時之中而四時以冬至爲首者陽道也古曆立元紀蔀步口切章年月日時各有其事時者太陽所歷地盤十二方位日者太陽出没一周月者太陰盈虧始終年者寒暑榮枯一變章者至朔合於一時蔀者至朔合於子時紀者至朔合於甲子日子時元者至朔合於甲子歲甲子日甲子時也百芒爲毫百毫爲杪百杪爲分分卽刻也二十五刻爲三時十二時爲日三十日爲月十二月爲年十九年爲一章四章爲一蔀二十蔀爲一紀三紀爲一元則一元是四千五百六十年一元之首冬至太陽在子一元滿則冬至太陽在卯二元滿則冬至太陽反躔午三元滿冬至太陽在酉四元滿冬至太陽復躔子則四元乃一萬八千二百四十年太陽還元而積六千七百二十閏者蓋一章有七閏也四時失度陰陽不調者春則國有恐民多疫夏則禾不熟女有災秋則民瘧而致齀渠牛切嚏丁計切冬則多癘而來痼疾皆陰陽不調之所致亦當修齋誦經以召天地之和氣也國主有災兵革四興夫天下太平國阜民安是一人有慶兆民賴之也若國家多事兵役疊起爲臣子者當盡忠効力以報上也師之與友恩不可忘夫齋戒誦經功德甚重齋者淸心戒者絶境若有經而无戒猶有魚而无筌昔老君五戒授尹眞人一百八十戒授于眞人天師七十二戒太淸二十四戒修眞十戒九眞妙戒靈寶九戒正一五戒其他載經懺者多然皆以戒慾爲首故老君曰若能全戒於内和光於外庶幾靈摽之崖矣慾心盡淨方可成功則生死受賴其福難勝也頌曰度人功大果无邊句句分明好結縁无始劫來師與友如今都會大羅天道言凡有是經能爲天地帝主兆民行是功德有災之日發心修齋燒香誦經十過皆諸天記名萬神侍衛右别至人尅得爲聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道者乃當洞明至言也上陽子曰凡有是經蓋經者道也凡有道之士與天地合德與日月合明與造化同體若爲國爲家爲人爲己行此經中之功德諸天皆與記名萬神爲之侍衛右别至人至人乃有功勤者爲聖君金闕之臣如天師旌陽浮丘眞君之道備德隆而皆爲金闕之臣也修學之士見善勇爲有過卽改改過則神明陰衛積善則功德尊高諸天記人功過竝無遺失儻功高德重天中魔王亦行保舉得道者聞道之人須當洞明經旨有成仙之至言也頌曰凡有是經便煉丹丹成克得步玄關三千功行渾餘事金闕宫中禮玉顏諸天中大梵隱語無量音天公經云大羅天宫有靈書上篇廣生高映是也又有龍章鳳篆正文觀覺鬱繿是也又有靈書中篇亶婁阿薈是也經謂雖有諸天猶拘劫運於是玉宸道君撰元始靈書三篇凝雲作篆每字方廣一丈八角垂芒以鎮三十二天卽如上三篇皆道君所述天眞皇人所書也後天眞皇人美此隱音重述靈書下篇森角儲雲是也如此乃有四篇今人止誦中篇而不誦上下篇者豈上天祕惜而下世罕聞之乎内音經云元始天尊於赤明世界栢陵説法眾眞侍座雲霧鬱勃三日三夜玄陰不解五老上帝白天尊言天尊演教所未曾見今白日晝陰不審何故天尊曰乃諸天發瑞靈應自然玉字煥爛障蔽天光咸令四座暝目伏聽俄頃天炁頓啟冥暗豁消忽有靈書字方一丈見於空玄之上天尊普告四座夫此靈書八會其趣宛奧難可尋詳當命天眞皇人訓釋其音以教諸天應得道成眞有仙名者天眞皇人奉天尊明命初啟靈書上篇但見廣生高映文彩燦爛莫可窺睹次啟龍篆正文又見觀覺鬱繿字皆八角垂芒精光奪目復啟靈書中篇始見亶婁阿薈字方一丈金光洞映爾時天眞皇人大興悲嘆不敢議問良久言曰靈書上篇龍篆正文天宫所祕劫運未周大道之奧未當聞于下世伏惟靈書中篇仰感天尊大慈三五應期眞道宜行乃釋靈音下教於未聞也是以上篇及于龍篆未敢輕泄玄祕唯中篇略倣天眞皇人之訓旁加增減使萬世之下得聞經之隱奧也他本以靈書上篇及龍篆正文置下篇之後者非是今正之元始靈書上篇道君撰東方八天廣生高映覺元洞虛應玄九眞化交肇圖文靈運搆宗範玄都感變總括威昭自成綠岑遷景皇道含明天琳耀權炁晶育魂融羅負立圓英隱旻期巨神包洪綱告寧南方八天章炎通泛堅敷澄宗虛象玄華龍陽儛穹微生霄艷淵大凝冲元關三紐大梵飛空隱覺隆益天倫慶呈神戸纏絡眞元散精淨握冥照回合陞遷導騫宴雲靈應騰天西方八天剛澤微控陰峻孤儀貫炁明素宸洞開微周化幽應澄虛帝臺平遐揖虛恢茂童池結飈臨育麗无散開陽通百六沉芒隱階幽廓冥默眞峰會靈堅丕順道吿命騫林北方八天龍安洞變純陽隱玄方本還炁象伏高員神變惠化解煉靈根赤精純道成號威尊利雲友常億劫中丘鬱城瓊壘謠音慶流受位玉室大憲通幽玄章煥落綱輪迺周龍章鳳篆正文道君撰東方八天觀覺鬱繿大明紫靈九神度魂開闢玉眞阿奕煒燁飛天流音輪景帝常都靈頤臻豁落大有慶雲啟靈七耀輝魔恬懀敷榮虛无上首天啟彌宸四吁員象濯曜騰精南方八天煥赫洞陽浮景玉光七靈謠歌世元紫堂羅英散景曜明玉房八景總獸韶玉攝精九都騫鬱飛生上靈密羅淨境馥育空輪灌沃黃華霐運玄明神宫開廓延宛丹庭西方八天大猷浮景眞定化元蜒宛素眇玉梁澄烟蕭峙結嵎景羅七纏秀盤三府流輝九玄寂然虛邈飛華拂軿晨濫綠籍太漠由延阿丘九度六龍儛轅蓊藹浮羅紫精馥淵北方八天溟涬太有九機化乾覆形厚德元河淪精育英明陀景辰眇雲大隗總監秀樂禁天紫虛陀丘劫量交前碧霞韻梵眇眇遊元六變運量馘絶惡愆恢寂玄漠萬度成仙如上玉字一篇乃龍章鳳篆正文皆諸天内名隱諱以玉簡金書祕于天之三十二宫以鎮三十二天誦念若勤卽獲應感元始靈書中篇道君撰東方八天亶婁阿薈无惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻答落大梵散烟慶雲飛灑玉都明魔上門无行上首回蹠流玄阿陀龍羅四象吁員亶婁阿薈无惒觀音元始以梵炁結此八字而成雲篆以鎮皇曾天玉京有亶樓上承玄都宫掌樓之監名阿那天中遊冶臺名薈无乃虛无之境惒乃日月之戶觀天帝諱音卽歌音謂每朝會阿那先登亶樓鳴大法鼓集諸天眞朝元始於虛无之境開日月之戶元始命天帝觀覺主長生籙領眾眞登薈臺歌洞章之音開度天人上陽子曰靈書玉字乃金丹之異名故云中篇訓釋言辭明還丹之妙用故云隱語學人到此先具智慧眼必有領悟處須延明首法攬菩曇八字雲篆鎮玉完天此天闕名須延都候號曰明首四眞人名法攬菩曇凡當大劫交元始命須延開玉府納諸仙聖明首導諸天主持梵炁於是法輪引籍攬覺度魂菩提轉輪曇頤揚旛自然九地開光學人皆得受度稼那阿奕忽訶流吟八字雲篆鎮何童天稼那掌籍眞人阿奕七寶瓊林忽飛天神王内名訶釋呼元始爲摩訶流布也吟歌也元始噓呵元梵之炁充滿阿奕七寶之林自成靈音流布萬天稼那舉籍以定生死飛天大聖度脫天人華都曲麗鮮菩育臻八字雲篆鎮平育天華都東極靑華之都一名太乙靑華之門曲洞章之歌麗乃玉女名鮮是慶雲菩樓名育帝諱臻至也元始居太乙華都命仙聖領諸玉女登菩樓歌洞章慶雲四集育帝始至開度長夜召魔舉仙答落大梵散煙慶雲八字雲篆鎮文舉天答落宫庭名大梵曲赦恩散煙慶雲天中梵炁元始遊答落之庭開大梵之赦放宥罪魂收攝元炁故得梵炁還元結成祥烟慶雲而歸金胎神室飛灑玉都明魔上門八字雲篆鎭摩夷天飛飛天灑神速玉玉眞都酆都明命也魔魔王上門上帝金門元始與飛天眾聖演説妙道自龍漢至延康灑然神速一會卽了當此之時玉眞開長夜之府酆都度八難之魂勅命魔王保舉身朝上帝金門无行上首回蹠流玄八字雲篆鎮越衡天元始以虛无妙道流行梵炁綱維八極上以彌羅諸天首環北帝之宫若大劫交運應數周上帝回施流晨之光華蹠履玄空以布化阿陀龍羅四象吁貟八字雲篆鎮蒙翳天天中山名阿山中樓名陀空峰山名龍日月光曰羅故天眞呼日爲濯羅四四極象象車吁南昌帝諱貟日中童名阿山龍山勢相交通炁與玉淸相屬九折而上連接陀樓日月之光普照四極眞人俱乘象車下度學人引謁南丹吁帝以求眞陽之火煉度生身吁帝卽命日中員童以九陽金精之華灌煉其體如上所釋化凡證聖天尊慈悲憫憐愚昧降此靈書玉字隱語使上士行靈書之道而頓悟中士聞玉字之玄而漸修下士誦隱語之經而求福此之謂靈寶大梵之妙也頌曰妙哉靈寶度人經雲篆天章閟玉淸阿奕華都行梵炁幽冥聞此獲更生南方八天南閻洞浮玉眸詵詵梵形落空九靈推前凙洛菩臺綠羅大千眇莽九醜韶謠縁邅雲上九都飛生自騫那育郁馥摩羅法輪霐池无鏡攬姿運容馥朗廓奕神纓自宫南閻洞浮玉眸詵詵八字雲篆鎮和陽天南方丹天世界有流火之庭飛閻煥乎八方中有洞陽宫火炁炎浮玉眸火之膏質詵詵大盛光明交映煉度學人梵形落空九靈推前八字雲篆鎮恭華天元始自龍漢暨延康從劫至劫化生人物皆凝大梵之炁以成形一神變現不受胎育從空而生玉都九靈眞人散金花于推前之臺嘯詠洞章開度天人凙洛菩臺綠羅大千八字雲篆鎮宗飄天凙天中山名洛道君内諱菩飛天内音臺凙山之陽有玉臺綠羅月宫玉妃名綠羅廣寒玉嬪名羅英日宫仙童名濯羅扶桑靈童名員大千南閻浮提爲大千世界凡一千世界爲小千一千小千爲中千一千中千爲大千以三次言千而曰三千凙山眾龍所伏中有黃房洛君所居從劫至劫不滅不生時領飛天大聖登玉臺歌洞章以度天人綠羅玉妃光照大千世界其形如玉美艾不艷乘大梵之炁理大陰度數以應天元无有差忒若大劫交日月俱會玉臺含光濳耀以俟劫運再開復元運化金液煉形之士於此尋下手處眇莽九醜韶謠縁邅八字雲篆鎭皇笳天眇莽混沌之狀九醜大力鬼獸韶魔王名謠卽謠歌縁南斗内諱邅北斗隱名天地未分其狀眇莽九獸之鬼齊天而生考人善惡魔王復謠歌以惱試學人若居慾境雖艷色冶容而心愈堅固轉色界爲神仙境界變慾心爲淸淨道心則北斗除其黑籍南斗與註仙名保舉之司引入此天金華山求太乙合同符契以遊宴諸天也雲上九都飛生自騫八字雲篆鎮堂耀天雲上神王諱九都玄臺名飛生更生大神名自騫從入騫林也飛天神王雲上焚百和香散五雲花太眞玉郎執十絶旛一日三迴迴旛一周則諸天帝齊集九都臺下遶臺三匝誦詠洞章開度學人若識此歌音則更生大神開不死之門流長生之炁煉其形魂從而保舉入騫林遊玄臺又二十四年行圓功滿得上朝玄都那育郁馥摩羅法輪八字雲篆鎭端靖天那天中侍郎育天闕空輪郁馥斗中仙童摩羅天中魔王法輪天宫法輪侍郎那主四時之炁運天闕空輪正天分度若大劫交法輪十轉萬神俱至郁馥唱禮一唱則萬神齊禮魔王歌洞章之曲受度學人霐池无鏡攬姿運容八字雲篆鎮恭慶天霐神龍之淵持龍淵都監无鏡神王名攬姿天門名運容玄和玉女名九龍伏于深淵都監常含金罌運東井黃華天元眞一之水灌煉天人无鏡開長夜之府度其九祖升超天門然後運容玉女開導學人煉之以朱靈之炁濯之以玄和之津變煉其體灌注其形馥朗廓奕神纓自宫八字雲篆鎮極瑤天馥朗玄臺山名廓奕神公内號神纓紫微靈童名自宫升紫微宫謂神公廓奕與元始同生爲玄炁之祖常歌洞章於馥朗之臺神纓靈童引導學人升紫微宫上朝元始大修行人鍊已純淨凝玉眸流火之膏乘綠羅大梵之炁居慾境而九醜不能考過入金華而太乙卽與合同霐持開冶煉之場運容灌玄和之液朱靈煉質黃華蕩形飛生更生神纓導引升入紫微宫也頌曰妙哉靈寶度人經玉簡金書蒨上淸郁馥敬躬申唱禮神公廓奕保仙名西方八天刀利禪猷婆泥咎通宛藪滌色太眇之堂流羅梵萌景蔚蕭嵎易邈無寂宛首少都阿繿郁竺華漠延由九開自辯阿那品首无量扶蓋浮羅合神玉誕長桑栢空度仙刀利禪猷婆泥咎通八字雲篆鎮孔昇天刀利南方世界禪黎國名猷好生君名婆泥洞陽宫靈童名咎通魔王内諱元始於刀利世界禪黎國洞陽宫火煉眞文洞煥萬天化此世界爲大福堂一切罪魂咸令升入學人道成則猷君度命婆泥煉魂魔王咎通敬受所事不敢遏絶生門宛藪滌色太眇之堂八字雲篆鎮皇崖天宛藪天帝内號滌滌蕩色色界太眇之堂卽天中大福堂乃天之祕府中隱大洞自然之文皇崖天帝主開大漠之經理治天炁每領諸仙遊行色界諸天出入上淸之府蕩滌穢氣開度學人行業高者得乘景雲之車上生太眇之堂流羅梵萌景蔚蕭嵎八字雲篆鎮極風天流天王諱羅月后名梵飛天眞人内音萌元始天王内名景皇四極上眞蔚秀景霄仙人蕭嵎劫仞之宫卽西方白素元君奥室流君正九霄之炁月后主遊宴之儀飛天開九霄之關萌君爲梵炁之祖景皇蔚秀開治蕭嵎之宫學人解悟此音方可馭丹龍之轡以升九皇之臺易邈无寂宛首少都八字雲篆鎮孝芒天易邈始皇帝諱无寂天中庭名宛首道君内音少都日中童名始皇天帝自龍漢至赤明劫居虛无寂寂之庭奉道君而演奥明妙法以度人靈童少都流以飛霞之彩灌以日華之精阿繿郁竺華漠延由八字雲篆鎮浮容天阿繿天帝隱諱郁默魔王内名竺欲界華色界漠渺漠延束鬼之庭由禁鬼之房郁魔隱現或居欲界或居色界惱亂天人渺漠難制帝君阿繿登九層之樓歌洞章以攝之於是眾魔應響而束身羣鬼詣由而伏形九開自辯阿那品首八字雲篆鎮江由天天地未判三炁混沌九度初開陰陽男女自然明辯帝君阿丘常登龍山九玄之都勅諸飛天那邪遊空開度善根之人品度其魂入飛仙之上首无量扶蓋浮羅合神八字雲篆鎮阮樂天无量天中大聖扶更生君名蓋此天宫名浮幽魂之呼羅大羅合合慶神神公无量大聖總統飛天皆受品量而升進之更生君居蓋宫主長夜之籙定善惡之根度諸幽魂升大羅天與神公合慶也玉誕長桑栢空度仙八字雲篆鎮曇誓天玉誕玉都長桑扶桑騫林栢栢陵空空洞度仙度人成仙玉都有騫木扶桑之林廕覆諸天葉皆紫字金書每神風吹返魂之草則桑林鼓百籟之音一如天尊昔栢陵説法時林木自成空洞之歌有靈鷄栖于上一鳴則天下鷄皆鳴於是靑霞扶搖太陽乃升諸飛天眞聽鷄初鳴上登玉臺採五方之雲牙吸嚥三晨之光以度學仙之人上根之士一志淸淨雖居竺華之境郁魔不能惱亂迺得少都灌眞流羅主宴桑林鼓籟太陽流暉以成還丹也頌曰妙哉靈寶度人經八角垂芒晃太淸太眇之堂无色界長桑林下嚥華精北方八天玃无自育九日導乾坤母東覆形攝上玄陁羅育邈眇炁合雲飛天大醜總監上天沙陁劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕无品洞妙自眞元梵恢漠幽寂度人玃无自育九日導乾八字雲篆鎮霄度天飛天玃无自龍漢溟涬之間乘運而出時與育帝乘鳳車遊九玄之鄉轉九機之度以應劫運之數大劫交則日華童子停光運化回度天常之乾道開導和炁也坤母東覆形攝上玄八字雲篆鎮元洞天坤母太陰九靈仙母東覆東海理水神名形地機攝召也上上告玄玄都九靈仙母主治東極扶桑暘谷之淵總持地機旋轉元氣天關地機轉動一周則溢水三千三百度度極則天地炁交九海混一眾水彌天東覆大神主治崑崙之頂填涸巨海過東井之源使地機不淪如劫交則坤母出東井召鳥母於龍門制會河源上詣帝前申告劫會乃以鳳車乘載學人升于崑崙以朝玄都上陽子曰妙經者上妙之首經也道藏萬八千篇妙在度人一卷度人一經妙在靈書一篇靈書之中顯此八字奚謂元始祕隱玄妙至此忒殺泄盡天機天尊廣大慈悲世人儘自疑信噫經爲至人説也至人則能用此經也故淸河老人頌之曰玃无乘運應乾元旋轉九運保天根劫終鳥母會龍門學人乘鳳升崑崙羽林受符拜新恩雲衣縹緲朝帝軒金液還丹之妙至人於此具眼陁羅育邈眇炁合雲八字雲篆鎮妙成天陁飛天名羅月之光育妙成天主諱邈羽林監神名謂陁與育俱生雲阿之嶺抱月之光治羽林軍羽林軍在北雲阿嶺在南時勅邈監遊行三界保度學仙之人詣羽林軍受符信乘眇然梵炁與諸天合景結雲炁以爲衣煉月光而實腹飛天大醜總監上天八字雲篆鎮禁上天飛天神王大醜都錄之司宗伯總監飛天神王麾下二神名上天升天也飛天神王總上天劫會之運管三界都錄之司時勅總監二神總錄長夜之府升幽魂於天界使與道以合眞沙陁劫量龍漢瑛鮮八字雲篆鎮常融天此天有沙蘭宫陁丘山劫量隨劫銓量龍漢初劫名瑛神王諱鮮日童名吉沙蘭宫陁丘山係玉淸紫微别館新得受度而功未圓者常巨萬人停散其中皆龍漢時人隨劫運交詮量其功而詣上宫學人若明此音則瑛君察功行而度品鮮童灌日精以煉形也碧落浮黎空歌保珍八字雲篆鎮騰勝天碧落天霞也浮黎天王諱空天中侍宸名歌大洞之音天王步虛碧霞開而乘飛雲之輦侍宸一嘯靈風扇而成大洞之歌引導諸仙上朝七寶保持下學珍愛靈書惡奕无品洞妙自珍八字雲篆鎮梵度天惡奕天帝内音无太无眞人天帝惡奕自元始祖劫修行超出三界位入玉虛時勅太无眞人大開長夜之府品度罪魂使其洞明宿命淨盡惡根上升妙化之福堂自樂至眞之妙道也元梵恢漠幽寂度人八字雲篆鎮賈奕天元始大梵之炁恢漠廣大難窮高而空浮懸而不落雖幽而莫見乃能變化雖寂然不動感而遂通其中有眞眞中有精其精甚眞妙不可名顛之倒之逆施五行度无量人以成還丹之道也大修行人眞心堅固信受奉行卽得性命混融形神俱妙超凡入聖積行累功以證高仙上聖之位也頌曰天尊説法度天人大梵靈書顯至眞好是眞經靈驗處大羅天上總安身道言此諸天中大梵隱語无量之音舊文字皆廣長一丈天眞皇人昔書其文以爲正音有知其音能齋而誦之者諸天皆遣飛天神王下觀其身書其功勤上奏諸天萬神朝禮地祇侍門大勳魔王保舉上仙道備剋得遊行三界昇入金門此音无所不辟无所不禳无所不度无所不成天眞自然之音也故誦之致飛天下觀上帝遙唱萬神朝禮三界侍軒群妖束首鬼精自亡琳琅振響十方肅淸河海靜默山嶽吞烟萬靈振伏招集群仙天无氛穢地无妖塵冥慧洞淸大量玄玄也上陽子曰此經結處乃太極眞人所述舊文字皆廣長一丈謂龍漢之初元始以梵炁結而成文一丈乃天地之成數太極眞人述云天眞皇人昔書其文以爲正音此靈書乃大道之根還丹之主有知其音蓋此隱語非中下士所能穎悟若至聖大根神仙種子得師點破卽解其音一聞百悟欣慶无量更不遲疑内齋外戒信受奉行故太上曰上士聞道勤而行之夫行道之人神明護門魔鬼潛迹人能齋誦此經則飛天神王下觀其身果淸淨否又書其功果勤行否若其身果然淸淨欲不能干魔不能試又其功果然勇猛堅固精進勤行不怠則萬神自然朝禮地衹爲之侍門魔王亦行保舉俟其道備丹成修行至經功滿德就身外有身高超三界昇入金門此音隨人所行行之勤者得道成仙誦之勤者所求如願是以辟禳度拔无所不成也故誦之致飛天下觀夫誦經者必齋心戒欲掃地更衣焚香端坐收視存神方可誦經誠心精致渾無雜想故能感召飛天下觀書其功勤上帝遙唱感其精專今人手執素珠其心妄想何所不至而口喃喃以爲誦經豈得萬神朝禮三界侍軒又且反招殃譴而不可逭此音世法之謂自保舉上仙至地无妖塵乃玉晨道君前叙已詳太極眞人於此結經重爲宣敭以成靈寶度人功德若以道用則飛天下觀乃神返身中上帝遙唱是脫胎神化萬神朝禮一炁朝元三界侍軒三元内守群妖束首魔鬼伏降鬼精自亡尸怪殄滅琳琅振響和炁斯應十方肅淸内外貞白河海靜默性寂情冥山嶽吞烟脉住炁停萬靈振伏陽神出現招集羣仙功成道備天无氛穢廣大遍周地无妖塵光明淸靜冥慧洞淸慧一作惠四字乃證結經之義幽冥溥燭慧照无邊惠及一切洞煥太空升淸虛渺渺之天更无拘滯廣大量玄玄之妙莫盡讚揚也頌曰一卷眞經字五千重重密密總敷宣要知妙道功圓好結習都忘證上仙元始靈書下篇天眞皇人撰東方八天森角儲雲九魂煉精枳默窺玦浮枚臼𨀛鹿幾揚房碧提酇回池滇黨負蚑逭謁携澡章變瑜蘭泮碧壞亢傍野生極中昆淸曜展洞涸寂无眇凝素倚虛羅皇達元靈南方八天炎度綽堂大霄瑤隅歷遐薦漪周扃加圖披嶢蹊臄觚亶渾都戟芸荼炫井欺持蒲掌維迮儀奕光琅璀扁縷益但幽微畢雷涓湟寔東赤曜叢稽玉玄演侯栢璖至規西方八天鎬正左適婆泥殺靈悲招均疆洎南躔魁靜夷損光混元覺縁道守岑遙綿徵知宣太靈湮漠昞和盧隨哲京常華墟咸堅沙栗鐸黜株會衍球裴卓雲靑府業覩般基北方八天洼孩蒙甘翠宇九闌蕭鈎漣興龍汾神關溝淪泬魔豁蠻祈通玄寥亢息无知肆明蟒修吉夕馥壇時畎湯長敷昌匪庸謹濟朝康堲寬祕法侈宜廣帝理生衛肇宏人天眞皇人梵炁玄遼天寶自然八合之音主治世會地壘洪澤變災厄難誦詠之者禳辟妖祥淸淨道炁无不寧也地官奉書百靈畏敬神朱寫文服佩明驗施之於至學不宣於下俗也太極眞人頌神靈煥層虛梵羅屯碧霄元始九龍駕皇人按靑軺靈光葉萬眞珠影開陽寥出示靈寶篇福德由是招洞玄隱高嚴玉音泛雲璈无量匪得思道海生波濤法義同涓流滋植成嘉苗用以振窮饑教興衛中朝帝尊壽億年太平滅兵刀稽首望玉宸靈華散金毫太極眞人曰太上玉宸大道君居紫霞之上七映之天紀錄玄文玉妃捧經金童散香太乙執巾玉郎侍筵龍吟虎嘷慶雲蒙靄十方天眞大神上聖高眞妙行眞人无極飛天神王三界大魔九天丈人无鞅數眾吟咏玉經皈依太上靈寶妙法昌運流行億劫長存元始无量度人上品妙經解註卷下誦經畢呪曰上皇太眞使我昇靈淸齋澡煉誦詠金經七玄披散上朝太虛延年長存刻名錄書閉目咽液三過叩齒三通復爐呪曰臣誦經已訖向來所出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人各還金房玉室在左還左在右還右毋令差互後召復到一如故事再叩齒三通念向來聽經衛經聖眾解壇散席各復所司神風靜默山海肅淸千邪伏匿百靈護形心拜咽液叩齒收經上陽子曰天尊說經以度迷人世人若不沉迷天尊奚肯漏露夫人之生稟父精母血成其軀殻及乎年壯與嗜欲俱卻將所受之精流于愛河慾海喪之早者不滿下壽喪之遲者不滿中壽喪之晩者不滿上壽若欲身安壽永唯當絶慾寶精人之壽命主乎精氣猶燈之有油如魚之有水油枯燈滅水涸魚亡奈何愚人以苦爲樂見色棄生豈知精竭命亦隨逝天尊慈憫說出此經可以煉丹使人知回其氣知還其元知寶其身知永其壽然愚者不及智者過之何以故智者曰生必死死則已又何地獄之信哉是云過之愚者曰不修善不作惡饑則飯困則眠此卽天堂更有何道是云不及雖然經與至人授也道與上士說也上士至人誦經行道積行累功功高則身超大羅行滿則臣事三境也頌曰此經祕在大羅天玉女持花侍法筵經足丹成功行滿鸞翔鳳舞駕雲軿
