上天其施度人妙化必先嚴行攝起北都羅酆撿舉愛根以煉還丹庶令神公受命神公即我元神號馬龍氏諱廓奕其稟受元始梵氣真命一切掃去貪淫不祥之鬼八威吐毒八威乃眼耳鼻舌身意六識并合藏傳送為八識號曰八威吐去色聲香味觸法之毒害不令惱亂然後金剛神王駕猛馬以四張遣天丁前驅勇猛而進飭大帥仗幡堅固而行擲火萬里則光爍爍流鈴八衝則圓陀陀彼四帝諸天若稍有干試拒上天度人之道遏元始一氣之真使不能還元則金剛神王以金鉞而前戮巨天力士伏巨戈而後刑屠割五濁之淫鬼急如風火以無停蓋半時之功要疾速之意千千截首千妖屏迹萬萬剪形萬怪逃形彼無干試違犯三官三元也北酆真性也則三元專制真性洞明檢按鬼妖營窟不得容隱元始梵氣金馬黃道也驛程急遞也使此氣馳逐黃道而歸神室普告無窮一氣所臨萬神聽令三界即三田五帝即五官皆列言奏功于上清也以世法則如經所言不釋亦明頌曰赫奕威雄正令行魔無干犯鬼無精一些徂氣還丹就三界列言奏上清元洞玉曆龍漢延康眇眇億劫混沌之中上無復色下無復淵風澤洞虛金剛乘天天上天下無幽無冥無形無景無極無窮溟涬大梵寥廓無光赤明開圖運度自然元始安鎮敷落五篇赤書玉宇八威龍文保制劫運使天長存梵氣彌羅萬範開張元綱流演三十二天輪轉無色周回十方旋斗歷箕回度五常三十五分總氣上元八景冥合氣入玄玄上陽子曰二章為經之脈為丹之髓何也本章是煉金液還丹事故示赤文為采藥之具十方浮空而來齊到帝前乃聚精會神至今日欣慶受度方乃合丹既得一氣還元則身中五斗五帝效職驅邪逐去陰魔鬼氣故示萬萬剪形之功老子曰下德為之而有以為者本章之謂也此章是煉玉液大丹事故示玉曆為紀元之始所以無幽無冥無形無影者蓋氣初回而未帖得元始梵氣安鎮則萬範開張以至萬氣齊仙也九品經曰昔混元溟幸諸天未分元始肇形五劫初化乃命梵元祖晨道君肇録天元運乘五劫故元洞者以成祖氣玉曆者以紀天元自一氣化分三因成九若龍若蜒蟠曲九道漠漠無極總九陽祖氣之元太上乃運梵合氣開始青天元祖氣故東方得九氣以分天境劫號龍漢南方得三氣以分天境劫號赤明中央得十二氣以分天境劫號上皇西方得七氣以分天境劫號延康北方得五氣以分天境劫號開皇五劫既周昊天成象一氣混道八景流光八帝示形九霄分化結元洞五陽之氣為玉曆乃命天真皇人以玉曆紀元洞之初劫運流復之本天真天民學仙功績升退之道青元真人曰天地生成始於龍漢終於延康幾成幾壞莫可億度故云眇眇每劫運壞天地蕩散山海消融物象一空無復形質唯元洞之氣混然不分沌然始構是云混沌當此之時踖包真一之水而五行未胚上無色象下無淵極上風下澤空洞虛無金剛之氣乘載天根幽冥言隱顯形影言物象窮極言分際溟涬言曠蕩當其混沌之中天上天下隱顯曠蕩莫分物象分際未别唯大梵之氣寥廓未有光影及後金風氣摩而生火四象化合而生土博載天地長養萬物此謂三境高真過度災劫乃比衆生沉滯生死輪轉無窮喻金丹返本如經劫運之難今幸梵氣還元尚無形象赤明開圖赤明元年玉曆定紀天地日月山川物象分判生長亦猶還丹之有位也四序推遷各得其所故曰運度自然亦猶還丹之元為也元始安鎮敷落五篇元始觀梵氣結形刻玉成雲篆天章載妙元神真道五者故云五篇悟其妙者入其妙悟其元者入其元悟其神者入其神悟其真者入其真悟其道者入其道故盡妙合元盡元合神盡神合真盡真合道字經火煉故云赤書八威龍文文列蒼龍巨虬金師麒麟白虎玄豹丹蛇巨獬之狀是云八威其文保制劫運使天長存也梵氣彌羅元氣所化曰梵氣先天地立為大道根元始資之而御運天地賴之以生成彌覆三界羅絡諸天兩儀既張物象咸布故云萬範開張梵氣為元化之綱流演於三十二天如輪運轉從無色界周回十方自斗至箕回度五常以日月五星合二十八宿故云三十五分總受高上天元之氣八景冥然交合以成玄功故云氣入玄玄皆喻還丹將結胎嬰也頌曰無形無影却尋蹤一氣周回顯聖功最是金丹靈妙處開張萬範廣神通玄中太皇上帝高頁泛景太霞嘯詠洞章金真朗郁流響雲營玉音攝氣靈風聚煙紫虛鬱秀輔翼萬仙千和萬合自然成真頁中有神長生大君無英公子白元尊神太乙司命桃康合延執符把籙保命生根上遊上清出入華房八冥之內細微之中下鎮人身泥丸絳宫中理五氣混合百神十轉回靈萬氣齊仙仙道貴生無量度人上開八門飛天法輪罪福禁戒宿命因緣普受開度死魂生身身得受生上聞諸天諸天之上各有生門上陽子曰此明金丹道用玄中天心也即人身正中之心太皇元始也即徂氣曰道寶上帝道君也即金母曰經寶高真老君也即丹體曰法寶是為一體三寶釋云清淨法身是性圓滿報身是智千百億化身是行性與命合陰慘陽舒泛景太霞嘯詠洞章梵氣始生泛然涵泳于元和之中金公乍還快暢嘯詠於洞章之句金真朗郁金氣周行流響雲營氣營鄞鄂玉音攝氣玉液煎鉛靈風聚煙鉛為汞制紫虛鬱秀汞結紫花輔翼萬仙功行外備千和萬合煉成一塊自然成真胎嬰已成真中有神胎已凝神長生主心無英主肝白元主肺太乙主頭司命主神桃康主脾合延主腎執符把籙煉氣合神上逰上清梵氣上行出入華房自頂至踵頭有三華之庭體有曲密之房八冥之內皆氣通行細微之中無所不至下鎮人身升泥丸下絳宫中理五氣住黃庭合百神十轉而百靈回我十月而萬氣齊仙身外有身真人出現仙道貴乎長生太上無量度人八門有長生之門法輪乃運轉之道凡世有罪福宿命仙家唯禁戒功緣形神普受開度死魂悉得生身此身得受長生姓名上聞諸天諸天校緑功行隨品定其生門功高則金闕侍宸行滿則上仙品級上陽子南嶽侍趙老師聞人誦度人經問曰何云金剛乘天師曰要莫糊塗你且從頭説來我先問你混洞赤文是何物就起揖問師曰我聞這四字便一身冷汗言下印悟把此經一串透過師却曰你知金剛乘天了也曰通身是汗師曰參須實參悟須實悟更向上説句來曰如今超無色界了師鳴指一下曰如是如是這般話頭道是機鋒不怕罪福禁戒忒恁泄露經旨所恃將來過平育天魔王却肯保舉也此經尊妙不可稱量故為三洞上品道藏之首然體元始之意大槩唯欲存道説經以明道使人知敬此道出經以泄道欲人知行此道是道為經之體經為道之用因經顯道因道尋經世之凡夫聞經則敬聞道則笑遇經則琅琅而念誦聞道則成群而毁謗只如道為母經為子世未有愛其子而詈其母也道之所以開天地揭日月施風雨役雷霆今人聞雷霆則掩耳聞道則非笑太上雖慈悲而不加譴然人之自取沉墜者為當何如何謂道何謂經全陰陽造化者謂之道全性命體用者謂之經有陰而無陽不可以為道有體而無用不可以為經是道為陰陽之根經乃性命之用以真性合元命是配陰陽以外形合內神是全體用夫唯元始還丹之道與人受胎本同人受凡父母精血之初亦溟幸混沌而無形精血既安一月為胞二月成胎三月生魂四月定魄五月分五臟六月開六腑七月明七竅八月具八景九月相足十月氣全脫胎而生還丹之道正類是也其受靈父聖母妙氣之初必九和十合而金氣始來亦溟幸混沌洞虛寥廓無色無淵之可倚無形無影之可依元氣安鎮五行敷落彌羅周回冥然凝合況嘯朗營復元歸空攝聚鬱輔含孕懷真生五臟理五氣合百神結胎嬰號曰陽神出入神化但人受凡父母精血而生其質不靈金丹是靈父聖母之氣而育能變化飛行是謂性命雙修形神俱妙頌曰混合百神賴此經此經尊妙甚分明天中梵氣胎嬰就萬氣齊仙步玉京中有空洞謡歌之章魔王靈篇辭參高真第一欲界飛空之音人道眇眇仙道莽莽鬼道樂兮當人生門天道貴生鬼道貴終仙道常自吉鬼道常自凶高上清靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼群但欲遏人算斷絶人命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天氣蕩蕩我道日興隆上陽子曰靈寶經法云洞章乃龜山丹黃飛玄紫文非魔王所為尹真人侍老君西遊龜臺入七寶園觀其文修之有法布此三章于世令人開悟超出三界昔天尊降魔魔王悉皆稽首受事乃敕魔王郁默統治欲界敕魔王摩羅統治色界敕魔王無明治無色界各歌謡章變化飛空警戒天人屏絶欲鬼令人聞此飛空之音轉色欲苦歸清淨門自黃曾至摩夷為欲界六欲俱淨則升色界人道眇眇微而陽失仙道莽莽高遠難明生門者生人生物之門成仙作佛之門鐘離真人曰生我之門死我户即此門也為人不悟則欲鬼當此之門為樂天道好生為貴而人苦趣鬼道高上清靈爽高上之人心清性靈其辭爽慨悲憫愚惑謡歌朗徹太空葛仙翁流珠歌曰流珠流珠役我區區忙忙汲汲忘寢失哺吾今六十憂赴三塗真人度我要大丈夫諦觀斯語豈非悲歌朗太空者乎太上留經之意願世人修證仙道不欲人趨邪道而終窮也北都泉曲府世之欲海中有萬鬼群總皆色類若人耽迷則遏算而絶命根學人為阿人或居色界時歌洞章攝伏羅酆蓋北都羅酆乃人之欲根也欲根才動羅酆起漫漫之黑雲六鬼交鋒妖精趨淋淋之苦雨學人到此要降伏之變欲界而為長樂以煉還丹化鬼妖而為諸天以施靈藥則金光之氣蕩蕩而我丹道日興隆矣頌曰伶俐惺惺日夜忙誰分地獄與天堂好將冷眼看浮世唤醒阿人歌洞章第二色界魔王之章落落高張明氣四騫梵行諸天周回十方無量大神皆由我身我有洞章萬遍成仙仙道貴度鬼道相連天地渺莽穢氣氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别真我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故為歌音自越行天至曇誓天共一十八天為色界此天之人有形無欲分粗細輕一十八塵塵染俱淨升無色界落落高張色天遠大明氣四騫梵氣朗明無量大神我身魔試洞章萬遍結習皆忘仙道貴度出于色界鬼道欲人相連色界丹陽真人東州富室日唯耽樂重陽徂師特徵度之一見即曰我來扶醉人丹陽瞋曰如何是道曰五行不到處丹陽大悟從學登仙此豈非仙道貴度者乎天地渺莽色境何窮南華經云物來無窮我心有際穢氣氛氛結而不散三界樂兮過之長存過此色界超三界天升上清境可以長存身度我界體入自然色超色類不為所迷得大自在薄由我恩因經悟道龍漢蕩蕩真偽莫分我界難度色相未除豈能度脫魔境故作洞章之文以相勉又變化飛空以魔試其間成者少敗懈退者多笑爾不能出此色境故為歌謡此文也頌曰色界天中十八塵此心未淨即非真要知我界何難度度者如今有幾人第三無色界魔王歌曰三界之上眇眇大羅上無色根雲層峨峨唯有元始浩劫之家部制我界統乘玄都有過我界身入玉虛我位上王匡御衆魔空中萬變穢氣氛葩保頁者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何自皓庭至秀樂四天為無色界太真科曰無色界中至真無情色欲俱空無復形質之患修至一天唯存心識以入氣觀氣觀道成上升一天又能去除心識以至無為復升一天若萬法在心若有若無又升一天若氣觀轉妙結習都忘洞入自然即升種民天也本際經曰煩惱為結學業為習結習已盡超種民位洞入道境隨氣升降災所不及也青元真人曰無色界中雖能離染忘色然未能遣忘尤以心識為患故有穢氣氛葩則鬼道易為邪入偶失制御即墜色界直須忘心自遣觀空入妙老君經曰所空既無無無亦無湛然常寂方是真靜普浪子劉長生真人洛陽三年日唯觀空遣忘愛根才動便乃誦曰北都泉曲府中有萬鬼郡但欲遏人算斷絶人命門誦此謡章愛根斬然豈非阿人歌洞章以攝北羅酆者乎此為真實工夫所謂仙道貴實也世皆耽迷不樂仙道轉輪五苦須欲提拔復奈之何頌曰無色天中甚磨無這回心地莫糊塗他家不是間花草要把真身入玉虛此三界之上飛空之中魔玉歌音音參洞章誦之百遍名度南宫誦之千遍魔王保迎萬遍道備飛升太空過度三界位登仙公有聞靈音魔王敬形敕制地祇侍衛送迎拔出地户五苦八難七徂升遷永離鬼宫魂度朱陵受煉更生是謂無量普度無窮有祕上天文諸天共所崇泄慢墮地獄禍及七祖翁三界之上無非魔王之所居飛空之中遍歌謡章以魔試能禆妙道故參洞章夫天尊説誦經曉世人以行道誦之百遍猶梵氣之初回是云名度南宫誦之千遍猶胎嬰之已結故云魔王保迎萬遍道備脫胎神化故云飛升太空此謂道備若不修道只誦萬遍以望飛升者亦難矣經功圓成遇度三界還丹行滿位登仙公有聞靈音萬劫一過魔王敬形道高德重勑制地只敕乃梵氣地即戊土流戊就巳返本還元拔出地户陰消陽長五苦八難超五行數除八識根永離鬼官陰絶坤户魂度朱陵陽聚離宫有祕上天文凡學道之人睹經則寶愛而珍藏還丹則潛修而密煉是謂之祕諸天共所崇丹道與經皆圓諸天共所崇仰何謂泄慢輕易妄為有聞而不行或行而不祕皆受泄慢之禍恐墮地獄之中至於禍及祖翁印是喪盡元氣却怨丹經妄語又謂太上空言寧不回思自己妄為泄慢之過也頌曰何故謡章參洞章只緣地獄與天堂儘知地獄惟心造好向天堂做一場道言此二章並是諸天上帝及至靈魔玉隱祕之音皆是大梵之言非世上常辭言無韻麗曲無華宛故謂玄奧難可尋詳上天所寶祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寶質心依舊格告盟十天然後而付焉上陽子曰此經冠于諸經者首尾相應前後相隨故也如上卷乃天真皇人筆録玉晨道君序述元始天尊之説而萬世之下得此經誦之者猶如當時親睹其事斯為妙也本章玉曆二章為正經三界魔王歌章接于二章之後不屬正經以其文魔試學人之功為多故參于元洞之末是云音參洞章也此下則天真皇人又述道君之言耳此二章印混洞赤文元洞玉曆二章混洞赤文明先天元始玄一之還丹元洞玉曆明後天無為至真之妙道言此二章獨掌不鳴並是諸天上帝無非一陰一陽至靈魔王全資神用隱祕之音玄關一竅大梵之言鉛銀砂汞在經則為諸天帝魔之隱祕在丹則為玄牝刀圭之梵言非世上常辭世上愚人開口談道且不知道為何物亦不知物為何用此謂非世上常辭也言無韻麗信言不美曲無華宛華則不實故謂玄奧顔閔雖慧莫猜難可尋詳黃老無師難悟上天所寶首經而已祕于天宫非世常用四萬劫一傳非人不可授至人者乃至聖之人也金寶質心以財易法夫金與寶世之所重愚人以金寶為命勝人以功名為命義士以名節為命至人以道德為命故至人煉金液九還神丹乃假金寶以為法財有法無財事鮮克濟有財無法即同愚人經法流通法財兩用依格告盟方可付強為妄作事難全此道用之説也若論世法則未見以金寶為質信而請經一卷者更四萬劫亦莫之有何以故彼安知是經有長生久視之道焉若言道用猶或有之何以故彼上根法器之士宿命因緣於丹經內默有所得未能深達玄旨忽聞此經妙諦必齎金寶信受不疑夫九還七返之方必外藥而合內藥若非金寶為質則安能得此經之妙又安能伏虎以降龍又安能得先天之氣自虛無中來也凡今之世愚夫濁子一聞法財必為大笑便謂修行者要徹骨貧一絲不挂只從事頑坐流于空寂渀蕩此輦直賺到老安知齋金寶以求妙經是法財兩用之旨希夷真人入室詩曰入室何獨異金花日日開靈苗從地出香蘂向天來又云欲慕天中寶應須動世財蓬萊瑶洞裏醖就九還杯王鼎真人曰凡俗欲求天上事尋時須用世間財蓋天中寶天上事是仙家密密運用之機却非傍門採取之謬伐瑳迷伽承師教已問云何為報師曰若辦五百羯利沙鉢那者足表深心爾時迷伽遍地尋覔既具集已即呈偈曰饒財多寶珍眷屬具成就必定於菩提常安住於法夫伐瑳迷伽為天人師留此一偈與後來人證道作佛之眼目非同外道邪魔之行諦觀斯語則此經必金寶質心而後付方得其妙頌曰一些財利不關心金寶何為度得人我是青城親付屬還丹只要虎龍親元始無量度人上品妙經注解卷中
