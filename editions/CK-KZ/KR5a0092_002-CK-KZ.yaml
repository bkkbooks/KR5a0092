front:
  text: 太上洞玄靈寶无量度人上品妙經註卷中
  hash: sha256:96d33f5a128e170e9d1875f899eaad682ac66b37a1311019df9cededca951702
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0092_CK-KZ_02p030b, image: JY002/CK-KZ_JY002_02p030b.png}
body:
  text: 上陽子曰經者道也敬也道則遵之而行敬則守之勿失世知所敬者三寶也夫三寶實妙道之宗以道用釋則曰身中三寶以世法釋則曰教中三寶其身中三寶有二事也曰教中三寶有二說也今言教中三寶曰道經師三寶有今科古科三寶此二說也道乃元始玄一之祖炁以生天地人物是爲道寶經乃玉晨道君演元始玄一之道爲萬世梯筏是爲經寶師則老君降授張天師經籙以傳世流教是爲師寶教之源流實遵天師而亦有二說也故教中以前三寶爲今科以後三寶爲古科而其號稱亦異此世法化俗之說若言道用則是身中三寶有二事也元始玄一至眞之精曰天寶亦曰道寶上淸金液先天之炁曰靈寶亦曰經寶混元无極至眞之神曰神寶亦曰法寶此身中之三寶非此三寶不能還丹不能做佛不能成仙而三寶大有金書言天寶靈寶神寶皆分炁而化亦身中之三寶若論還丹金液之道則身中三寶又有二說神炁精爲内三寶耳目口爲外三寶能尊其外三寶而不妄動則内三寶方結還丹而成胎嬰也故夫眞文寶符龍章鳳篆玉笈金書三洞奥典三十六部萬八千篇皆出於三寶中曰經所以經卽丹也卽先天之一炁也此度人經乃玉晨道君演元始之道以授玄一眞人玄一授天眞皇人天眞皇人依道君所傳書而成文以爲經故每章以道言置首唯本章與玉曆二章不題道言乃皇人直以元始之道而書之然皆道君之所授今人以有道言者爲序无道言者爲經非也有誦二章而不誦前經者尤非也前標太上洞玄靈寶无量度人上品妙經者皇人所標也此則直標元始无量度人上品妙經者道君所標也然經之源流所傳亦别而諸經皆出於道君故道君爲經寶經體道而行道因經而用若論金液還丹則經先丹而行丹後經而用借經表丹則曰先天无上靈寶九還金丹假道說經則曰元始无量度人上品妙經頌曰元始先天神炁精玄功无量最神靈度人度我須人度上品丹方是妙經元始洞玄靈寶本章上品妙首十迴度人百魔隱韻離合自然混洞赤文无无上眞元始祖劫化生諸天開明三景是爲天根上无復祖唯道爲身五文開廓普植神靈无文不光无文不明无文不立无文不成无文不度无文不生是爲大梵天中之天鬱羅蕭臺玉山上京上極无上大羅玉淸渺渺劫仞若亡若存三華離便大有妙庭金闕玉房森羅淨霐大行梵炁周迴十方中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司錄延壽益算度厄尊神迴骸起死无量度人今日校錄諸天臨軒上陽子曰此章渾是道用元始太極未分先天之祖炁洞玄三洞玄奥萬法之眞宗靈寶本章性也有也體也命之應也玄之根也老子曰有物混成先天地生是以能生物生人也上品妙首命也无也用也性之應也牝之門也紫陽眞人曰白虎首經至寶華池神水眞經以其能生佛生仙也迴者復也還也在經則曰十迴度人在丹則曰九還金丹此經所以爲三洞之冠者在一度字也求仙作佛必先明度字方能復此元陽眞炁以結還丹百魔隱韻身中六根八識三魂七魄三部八景二十四神未知行道之人皆爲其汨亂心君引歸慾界故曰百魔今旣修煉太丹則百魔受制更無惱試離合自然蓋還丹之道雖曰有爲而非强爲一離一合皆出造化之自然悟眞篇曰二物會時情性合五行全處虎龍蟠者此也混洞赤文卽本來之眞性不壞之元神靑元眞人曰元爲萬物之根立乎大象之首運化而无窮始爲恍惚之初在乎萬化之先獨尊而變遷洞玄洞觀玄一化度天人靈寶在天曰靈在世曰寶本章具載修眞合道之本上品獨得其玄方便設教妙首眾妙之首萬法之宗天地虛妙而淸陰陽同妙而純日月含妙而明五行合妙而精萬物盡妙而眞内義曰上品妙首金液還丹无上妙道之冠十迴度人十月之功度世爲仙百魔隱韻丹之異名離合自然喻金木間隔復能互并水火相尅復成旣濟自然而成造化混洞赤文萬物之本源眾生之眞性一炁之祖萬神所宗西昇經曰虛无生自然自然成大道夫道者无形无體卽先天一炁而化生萬物爲天地造化之本修金丹者體循造化以虛无自然先天眞一之炁名曰空炁金胎生金母而作丹基此炁父母未交之前與混沌同體故曰混洞父母媾精之後此炁欻然感附謂之陽精喻爲銀礦名曰元神藏在坤宫故謂之性卽本來面目未生之前謂之陰金已生之後謂之陽鉛是爲五金之母參同契曰徑指天地之靈根將爲藥祖明示陰陽之聖母用作丹基天地混沌之先此炁結而成玉字故曰赤文乃无上可上至眞妙道故曰无无上眞也元始祖劫化生諸天元炁始炁於祖劫初化分三炁而生三天曰淸微天禹餘天太赤天三天之炁化分九炁而生九天曰始靑天靑元天始丹天太丹天始素天大素天始玄天大玄天靑微天九天梵炁化分而生九霄九天曰大霄暉明流光素景天靑霄元眞寶曜天碧霄總生開靈傳道天絳霄太平應化道主天丹霄中極至妙變空天玉霄皓元威德耀晶天琅霄飛靑元關傳濟天紫霄合景雙闕化身天神霄玉淸妙景大有天九霄梵炁化分下生九天卽生神九天一南方鬱單无量天二西北禪善无量壽天三東方梵監須延天四西南寂然兜術天五東南波羅尼密不驕樂天六北方洞元化應聲天七西方靈化梵輔天八東北高虛淸明天九中央无想无結无愛天又生大羅上淸玉眞三十六天下生四種民天種民天之下一百三十五萬八千里生无色界四天无色界之下三十六萬里生色界一十八天色界之内有輕塵六天細塵六天麤塵六天色界之下三十萬里生欲界六天欲界之下五百二十億萬里化生五億諸天八圓世界四種民天之上布日月星辰主持萬物故曰開明三景人之生亦類是也父精母血包于母腹精血未凝如珠似露凝結之後生形五瓣頭與四肢男子先生左腎次右命門女則反是本性繼種於兩腎之間妙化之炁自然生發次則上生兩瞳神水以至化生五臟六腑九竅百脉筋骨齒髮炁足形全脫胎而生故老君曰天地媾精陰陽布化一月爲胞精血凝也二月爲胎形兆胚也三月陽神爲三魂動以生也四月陰靈爲七魄靜鎮形也五月五行分五臟以安神也六月六律定六腑用資靈也七月七精開七竅通光明也八月八景神具降眞靈也九月宫室羅布以定精也十月炁足萬象成也故神布炁滿三萬六千關節根源本始一時生神此爲化生諸天開明三景是爲天根本起經曰夫道得三乃成故三合成德道不滿三諸事不成以内言之則曰鉛汞砂直指其物則我眞性并日用妙化陰陽二炁合而成三上无復祖唯道爲身老君化胡經曰道者元炁虛无天地從之而生萬物資之而形皆祖炁之妙化在道則曰金丹故曰上无復祖唯道爲身也五文開廓普植神靈在丹則一炁復而變造五行五行具而成金胎在經則玉字出而結爲赤文五文具而植神靈五行者鉛汞砂銀土天一生水坎中藏鉛地二生火離中產砂天三生木震龍主汞地四生金兌虎體銀天五生土中宫結丹道非此不光文非此不明身非此不立丹非此不成炁非此不度藥非此不生是爲大梵天中之天大梵者先天炁凝而五行大備天中之天者身中有身也鬱羅蕭臺腦際也玉山上京泥丸也上極无上泥丸之上大羅玉淸太玄也太玄内祕一機名日月高奔神化脫胎之要黃庭經曰高奔日月吾上道乃見玉淸虛无老渺渺劫仞至高至尊若亡若存卽張眞人云視之不可見其形及至呼之又卻譍三華離便頂顛屬南南本三數頂爲華蓋又曰圓蓋南屬離離爲午位三華爲金華玉華九華内丹已結而頂有三華大有妙庭卽上丹田乃百關總會之穴金闕玉房日宫爲金闕左目也月宫爲玉房右目也森羅星宿也言日月星宿列布而一身九竅霐澄大行梵炁卽先天妙炁周迴十方言妙炁營衛金胎神室温養大丹如上皆道用略註尚有至妙之妙心傳方可内景旣露外景須明今復釋以世法庶幾賢愚各具眼目也混洞赤文自混沌之炁結而成赤文文字旣出而妙經行妙經行則祖炁具在人身散分于物類之内是曰无无上眞之謂也元始祖劫化生諸天元始以道祖而鎮大劫以祖炁而化生諸天祖炁分三炁而隸大羅三淸之界故曰開明三景要知此炁遇大劫而不壞故曰是爲天根此炁卽太極之始炁而生天生地生五行生人物已故曰上无復祖道之在人身亦猶炁之在天地間故曰唯道爲身赤文立而五文開廓經法行而普植神靈世无經文則不能光明不能成立不能自度自生是經爲大梵極品之音天中之天卽三淸大羅聖境大者覆蓋萬天羅者包羅三界中有玉京山周迴八萬里下與崑崙對立山有鬱羅蕭臺臺有七寶城上極无上有玉淸殿又有三華離便之宫大有妙庭皆天尊宴息之所金闕玉房瑤池翠水森森列布皆憑梵炁周迴運轉故得久而長存此中有度人不死之神卽元始分化之號南極長生君卽朱陵大帝治太微垣司火煉之事度世君主陽九百六之變司馬君主滅邪卻試好生君卽靑華之别名主詮校韓君主南昌品秩學人司命司錄主功過予奪延壽益算主增注年命度厄尊神主消平厄難迴骸起死君主升度死魂飛尸登晨今天尊說法臨集帝軒校圖檢錄品度學人如人身與玉京无異金闕玉房丹田泥丸冥然列布若一身神炁充滿則長生不死之神居其中亦如玉京之梵炁周迴而无壞頌曰玉京山上鬱羅臺上品經詮演十迴普植神靈行梵炁三華離便五文開東方无極飛天神王長生大聖无量度人南方无極飛天神王長生大聖无量度人西方无極飛天神王長生大聖无量度人北方无極飛天神王長生大聖无量度人東北无極飛天神王長生大聖无量度人東南无極飛天神王長生大聖无量度人西南无極飛天神王長生大聖无量度人西北无極飛天神王長生大聖无量度人上方无極飛天神王長生大聖无量度人下方无極飛天神王長生大聖无量度人十方至眞飛天神王長生度世无量大神並乘飛雲丹輿綠輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈旛前嘯九鳳齊唱後吹八鸞同鳴師子白鶴嘯歌邕邕五老啟途群仙翼轅億乘萬騎浮空而來傾光迴駕監眞度生上陽子曰十方飛天大聖皆元始道炁分形東方諱總南諱飛西諱雲北諱无鏡東北諱梵東南諱那郁西南諱度仙西北諱钁炁上方諱瑛下方諱落一曰十方長生大聖一曰十方救苦天尊奉元始命掌十方三界校量功德開度无量總括生死陶鑄學人藏經載八方諸天皆有无極大千世界東方无極諸天安大堂鄉大千納善世界南方无極諸天宛黎城境大千棄賢世界西方无極諸天福堂洲大千咸行世界北方无極諸天鬱單野大千淸靜世界東北无極諸天福集都大千長安世界東南无極諸天元福田大千用賢世界西南无極諸天延福鄉大千仁靜世界西北无極諸天福德野大千延賢世界上方上淸玉眞三十六天玄都无極世界下方黃曾三十二天八圓无極世界无量大神主監得道長生度世之事靑元眞人曰輿輦輪蓋皆陽精之炁所成鳳鶴龍鸞乃陰精之炁所化上聖之人具眞常之道呼吸合散隨意現前陰陽炁諧如歌似曲皆炁所爲並非外物人若還丹功成陰魔亦化陽神元氣一呼萬神咸聽五臟神靈各隨方色自現輿輦儀衛來迎百骸眾神前導後從升舉朝元與此無異五老啟途東方靑靈始老姓關諱開字靈威仰南方丹靈眞老姓洞浮諱極炎字赤熛弩中央元靈元老姓通班諱元氏字含樞紐西方皓靈皇老姓上金諱昌開字曜魄寶北方五靈玄老姓黑節諱靈會字隱侯局十方大聖道位高尊乃感五老啟途而群仙翼轅億乘萬騎浮空而來然皆法身之神丹經有曰神御炁炁留形傾光回駕玉光飛雲迴旋天尊之法座領監眾眞較度羣品以丹言則傾光迴駕乃坎離旣濟陰陽已交眞神化生温養胎室故曰監眞度生頌曰无極天眞集蘂宫丹輿綠輦御浮空傾光回駕群仙慶陽長陰消妙化功諸天丞相南昌上宫韓司主錄監生大神執籙把籍齊到帝前隨所應度嚴校諸天普告三界无極神鄉泉曲之府北都羅酆三官九署十二河源上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼羣元始符命時刻昇遷北都寒池部衛形魂制魔保舉度品南宫死魂受煉仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三塗五苦八難超凌三界逍遙上淸上淸之天天帝玉眞无色之境梵行上陽子曰此道用世法兩事俱明世法諸天丞相天天各有丞相一云卽大羅神公南昌卽丹天世界上宫卽朱陵火府韓司宫中丈人卽司命也主煉度文籍之事主錄乃天中宰協侍宸主錄勒籍之司監生主生魂鑄魄也太上説經各持錄籍齊到帝前校其應受度者或宿名玄圖骨相合仙或修齋奉戒功德積感或敬奉三寶善功徹天或供養師寶爲三官所稱名在諸天者各爲嚴行考校據功量品隨其高下應受升度也以道用則執籙把籍元始炁分而陰陽判三才旣立而文籍生内義曰顯諸仁則爲錄籍藏諸用則爲陰陽幽明无錄籍功罪何所記天地无陰陽造化何由成故帝前卽中宫神室帝之所御四海輻湊神之所舍萬炁混凝喻陰陽交會于中宫神室故曰執籙把籍齊到帝前天尊説經的非虛言欲人行其道耳修學之人且當改過遷善守戒防淫去詐息機淸心寡慾嗟夫世人逐末忘本賤命輕身英雄豪傑者爲功名所役聰明特達者爲進取所羇衣食富足者爲營計所籠貧窮困乏者爲口體所累其有出塵之士只樂逸豫以爲淸淨无爲是修行誤矣何能得陰陽交會於神室哉隨所應度金丹之道要實工夫隨功受報十分工夫有十分受用一或滅裂其報亦滅裂雖所修至密所爲莫知然渺渺大羅之天无不嚴校而紀錄者普告三界欲界色界无色界亦天地水三界也无極神鄉十方无極世界亦三界神庭廟杜泉曲之府北有大海人身則號爲泉曲其穢惡黑腥莫測邊際爲江海之要府停錄罪魂北都羅酆太極之初淸炁上爲圓蓋半淸半濁之炁中爲人物重濁之炁凝爲羅酆在北陰之癸地高萬餘里周迴數千里上參碧落下際風泉黑鬱之炁盤礴其中山有六洞宫一曰紂絶陰天宫二曰泰殺諒事宗天宫三曰明晨耐犯武城天宫四曰恬照罪炁天宫五曰宗靈七非天宫六曰敢司連宛屢天宫每宫各有魔王主之人能持此六官名常生敬畏者則魔王保舉削落罪名三官九署三官爲三元上元在山之阿去天爲近天官領之主校功善升降品秩中元在山之左地官領之中有靈獄主治罪魂爲追呼之府下元在山之右去風壘近水官主之下有九囚大獄寒冰之庭主治重罪鬼囚九署九壘土皇九令之司又有天上三官天官隸玉淸境置三宫九府三十六曹官僚皆化炁爲之總主上眞玉虛高皇上帝諸天帝聖及世男女生命籍罪福學道仙籍中元地官隸上淸境置三宫九府四十二曹官僚皆世人有功高德重者爲之總主五嶽諸眞得道神仙九地土皇八極諸靈官下元水府隸太淸境置三宫九府四十二曹官僚皆世人積善建功者補充總主水帝河海九江水府及仙簿人民生死功過三元各有三宫九府爲九署也十二河源一切水際分治罪魂之所天尊說經使爲學人上解祖考億劫種親削除三惡罪根更不拘留乘元始九龍符命而昇遷也北都寒池酆都洞陰之境有朔單鬱絶之都五炁天君主之九地之中北陰天君主之九水之中大溟水帝主之總號北都中有三界大魔五帝考官巨天力士勾校罪魂之神夫人生爲陽魂死爲陰魄若魂魄散亂莫可執持令其部衛形魂使不散壞乃得制魔保舉度品南宫度品者若積諸善根則受煉仙化若无功過受度人身若修行至經功滿則生身劫劫長存永度三塗一天塗色慾門上尸道二人塗愛慾門中尸道三地塗貪慾門下尸道此爲在世三塗如地獄鬼趣傍生爲陰界三塗也五苦者色累苦心門愛累苦神門貪累苦形門華競苦精門身累苦魂門夫學仙者被此三塗五苦所遏故云八難若能度之便超三界也若論還丹則普告三界三丹田也无極神鄉一身萬神之所泉曲之府卽慾海也北都羅酆乃愛根也學人不去愛根則汨没于慾海三官九署卽身中三元九宫十二河源人身有十二愛河之源上解祖考人爲妄想所迷嗜慾所汨昏濁沉滯不得淸明如人祖禰拘滯鬼群之化修煉者要萬炁朝生門百神守死戸疾除罪簿頓除慾想落滅惡根永絶妄縁則出類拔萃更不逼合於鬼群元始符命卽先天之眞炁符竅也汞也陽中之陰龍之弦炁也命妙也鉛也陰中之陽虎之弦炁也經云常无欲以觀其妙常有欲以觀其竅故先哲云書符不知竅反被鬼神笑老子曰窈兮冥其中有精其精甚眞其中有信此信卽符信也此爲元始符命其以元始眞炁符合命門之祖炁何哉夫人之身禀元始祖炁而生至于盛壯蹶趨於醉夢之場而此炁奔失若修行人先煉陽中之陰以留眞汞次煉陰中之陽以求眞鉛一時刻中凝結成丹則可覬升遷矣北都卽性根蕃生眞汞寒池卽命門蕃生眞鉛當此鉛汞交姤性命混融直須把握一念部衛形魂若形全魂復脉住炁停還丹始結故能制魔保舉度品南宫所謂枯槁形骸將死之魂受此鉛火煉度得神仙妙化之道以成眞人矣生身受度天尊顯此一句證出還丹之旨蓋此經非只爲死者言乃修行人生身受此眞炁以度且生身則陰陽可全而造化可掬學人能以有生之身倒用五行修此大丹以成高仙則劫劫長存隨劫輪轉與天齊年永度八難之苦超欲界色界无色界凌四種民天而逍遙上淸薛幽棲曰上淸有三十六天天帝皆道齊元始位列玉淸故云玉眞在无色之境之上出造化之外憑梵炁而行出入無間非如三十二天在乎三界之内也故曰梵行頌曰天帝玉眞六六天丹成道備與齊年形神俱妙經功滿劫劫長存位上仙他本有以此天帝名諱作元始靈書上篇者非也殊不知天公經云大羅天自有靈書上篇并觀覺鬱纜龍篆正文在靈書中篇前蜀本或置于下篇亦非也靑元眞人曰當從天公經是矣東方八天元始積九陽梵炁以成六天爲欲界二天爲色界天帝冕服皆靑太皇黃曾天異號淨天或稱睹史色黃次奎璧人修十善功凡一根淨者生此天釋云四天王天帝鬱繿玉明正音開玄攝明天帝内諱鬱繿帝魔隱意玉明四字祕天之紫極宫主長生籙太明玉完天或稱勝妙天色綠次璧人修二十善功二根淨者生此天釋云忉利天帝須阿那田正音保玄道靈天王内文須阿隱音那田四字祕天之紫房宫主度魂更生淸明何童天異號光天色黑次室人修四十善功三根淨者生此天一作河童釋云夜摩天帝元育齊京正音明生九眞天王隱諱元育眞人内文齊京四字祕天之九晨宫主布政教玄胎平育天異號梵天或稱忉利色赤次危人修六十善功四根淨者生此天釋云兜率陀天帝劉度内鮮正音飄翰默然天帝隱名劉度内鮮四字祕天之元景宫主召魔舉仙元明文舉天或云化樂色蒼次虛人修八十善功五根淨者生此天釋云樂變化天帝醜法輪正音開生舒天帝内文醜異號法輪三字祕天之廣寒宫主通行元炁上明七曜摩夷天異號化樂謂慾樂之極色黑次女人修一百善功六根淨者生此天釋云化化自在天帝恬懀延正音延虛明天帝内音恬懀隱號延三字祕天之大陰宫主開度幽難虛无越衡天或云初梵色碧次牛天人六根雖淨尚拘色塵乃升此天釋云初禪梵眾天帝正定光正音鏡無翹天帝内文正定光三字祕天之大玄宫主无上道太極濛翳天或云上梵色紫次斗天人一麤塵淨升此天亦號初禪天釋云梵輔天帝曲育九昌正音阿難淨明天王隱號曲育總文九昌四字祕天之玄都宫主煉度朽骸南方八天元始積三陽梵炁以成八天屬色界四天爲麤塵四天爲細塵靑冕赤旒朱服赤明和陽天或號少光色白次箕斗天人二麤塵淨升此天亦號初禪天釋云大梵天帝理禁上眞正音治安保仙天王隱號理禁上眞四字祕天之長明宫主煉仙成眞玄明恭華天或云光音色黃次箕天人三麤塵淨生此天亦號二禪天釋云少光天帝空謠醜音正音飛音炁靈天帝内文空謠醜音四字祕天之東華宫應化一切耀明宗飄天或云无量光色綠次尾天人四麤塵淨生此天亦號二禪天釋云无量光天帝重光明正音翹眞英天帝總號重光明三字祕天之浩元宫主劫終學仙之人竺落皇笳天異號初淨色靑次心天人五麤塵淨生此天亦號二禪天釋云光音天帝摩夷妙辯正音難玄明天帝隱諱摩夷内音妙辯四字祕天之淸玄宫主魔試學人虛明堂曜天異號嚴淨色赤次房天人六麤塵淨尚有細塵生此天釋云少淨天帝阿𨚧婁生正音彌論玄明天帝隱音阿𨚧梵號婁生四字祕天之重華宫主度學人觀明端靖天異號遍淨色蒼次氐天人一細塵淨生此天亦號三禪天釋云无量淨天帝鬱密羅千正音朗觀曜明天帝隱文鬱密内號羅千四字祕天之光華宫主開度天人玄明恭慶天或號无量淨色黑次亢天人二細塵淨生此天亦號三禪天釋云遍淨天帝龍羅菩提正音威淸道玄飛天内音龍羅帝君隱號菩提四字祕天之開闔宫主得道人太煥極瑤天異號福愛勝色碧次角天人三細塵淨生此天亦號四禪天釋云福生天帝宛黎无延正音洞眞永觀天王内文宛黎无延四字祕天之帝康宫主教學人西方八天元始積七陽梵炁以成二天爲色界細塵天六天爲輕塵天靑冕金旒白服元載孔昇天或云快樂色紫次軫角天人四細塵淨生此天亦號四禪天釋云福受天帝開眞定光正音開光竟眞帝君内音開隱諱眞定光四字祕天之延命宫主煉魂太安皇崖天異號極樂色白次軫天人五細塵淨生此天亦號四禪天釋云廣果天帝婆婁阿貪正音腪莫阿魂天君隱音婆婁帝魔内諱阿貪四字祕天之開明宫主度善人顯定極風天或云廣樂色黃次翼天人細塵雖淨尚餘輕染生此天亦號四禪天釋云无想天帝招眞童正音回翹威天君祕號招眞童三字祕天之大赤宫主度有善功之魂始皇孝芒天或云上妙色綠次張天人一輕染淨升此天釋云无煩惱天帝薩羅婁王正音君華大權玉眞隱文薩羅婁王四字祕天之大丹宫主披夜開幽太皇翁重浮容天或云色究竟天色靑次星以色塵漸除故云色究竟二輕染淨升此天釋云无熱天帝閔巴狂正音惠威光帝君内文閔巴狂三字祕天之華蓋宫主召魔集眞无思江由天或號最上妙色赤次柳天人三輕染淨升此天釋云善見天帝明梵光正音郎明法元帝君内號明梵光三字祕天之明堂宫主開度善魂上揲阮樂天或號自在色蒼次鬼天人四輕染淨升此天釋云善現天帝勃勃監正音鬱无眞星天帝内文勃勃内號監三字祕天之運靈宫品類天人无極曇誓天異號大自在亦云不還色黑次井天人五輕染淨升此天釋云色究竟天帝飄弩穹隆正音飛在虛英天魔内文飄弩天君隱諱穹隆四字祕天之中无宫主度仙北方八天元始積五陽梵炁以成四天爲无色界天四天爲種民天靑冕白旒皂服皓庭霄度天異號不空色碧次參井天人輕染雖淨尚餘結習升此天釋云无邊空處天帝慧覺昏正音無淸明帝君内音慧覺昏三字祕天之瓊瑤宫主拔度學人淵通元洞天異號大不空色紫次參天人色塵都忘但有心識升此天釋云无邊識處天帝梵行觀生正音洗權道光天君内音梵行隱諱觀生四字祕天之眞元宫主度學人太文翰