front:
  text: 元始無量度人上品妙經注解序往一太乙含真氣實為妙道仙宗靈寶度人經是謂洞玄上品生育天地闔闢陰陽造化得以運行元功恃而溥博昭懸日月旋斡星辰普殖神靈化生品彙者也在道德經以無為為先有為為次上德者無為也下德者有為也上仁者無為也上義者有為也此度人經則以有為為首無為為終玄座空浮者有為也冥慧洞清者無為也璇璣玉衡一時停輪者有為也十方肅清河海靜默者無為也故説經周竟十遍而枯骨成人有功勤上奏諸天則萬神朝禮三十二天三十二帝示祖劫之化生諸天隱諱諸天隱名恐天人之泄慢泄慢則禍及七祖勤行則位登仙翁萬劫不傳上天所寶何為靈寶氣謂之靈精謂之寶寂然不動感而遂通曰靈上無復祖唯道為身曰寶氣合而精聚曰上品神交而道合曰度人則知靈寶者精氣也精氣者汞鉛也汞鉛者陰陽也陰陽者離坎也離坎非得有為之道而既濟之則何由凝結而成黍米之珠哉厥夫人之初生也以無合有盜竊天地絪緼真一之氣以冒賦其形也孕育十月脫胎去蒂日漿夜乳然後形全而神王神全而精粹精盈而至和之氣盛塞先哲云氣全者不思食神全者不思睡精全者不思欲當此之時號曰純陽夫純陽者乾也上士於此而行上德無為之道內修外功則魔王敬形便得神仙謂夫末學道淺不樂仙道是以保真者少迷惑者多乃於醉生夢死之場熾于欲海愛河之地則向來所稟天地真一之氣潛奔而寓于坤矣繼此而往坤乃乘乾之一陽而為坎乾因坤破虧一陽而為離審兹欲從愛起愛逐情生情隨境亂况夫喜怒哀樂慮嘆變慹日夜相代乎前與物相刃相靡寧知物來無窮我心有際之説乎是以仙道難固鬼道易邪運應滅度身經太陰輪回無期可勝悲憫至人仙子獲遇真師頓悟人道者心諒不由他却於一氣潛虧之時早行靈寶度人之道以復之且復者何也即下德有為之道即上義為之之道即元始懸珠之道即流戊就己之道即降龍伏虎之道即煉鉛乾汞之道即金液歸真形神俱妙之道也領悟到此方信地藏發泄之妙金玉露形之功全其本年咸得長生過度三界飛升太空皆分內事况積德而建功者乎尋詳是經元始天尊於龍漢初天地始分玉宇且出乃撰此經時以紫筆書于空青之林宇皆廣長一丈以授玉晨道君玉晨授玄一真人玄一授天真皇人皇人細書其文以為正音祕而藏之軒轅時皇人與太清三仙王會峨嵋山黃帝再拜問道皇人授以五牙三一之文并度人經上卷黃帝修之上仙後帝嚳於牧德臺皇人授以本章玉曆章西漢元封間西王母以上卷并二章授武帝始成全經東漢時太上降授干吉增靈書上篇并太平經一百五十卷桓帝時老君降蜀授天師度人北斗諸經籙千餘卷吳時太極真人於會稽上虞山授太極左宫仙翁葛玄度人經增靈書中篇鄭真人思遠授抱朴子葛洪經本又增靈書上下篇太極真人後序即今之全本晉王纂遇道君賜此經及諸經數十卷元魏時寇謙之居嵩山修行感太上授此經并餘經六十餘卷經之流世人知念誦搗祈而不知有還丹久視之道存自政和御注繼以薛幽棲嚴東啓成玄英李少微諸家注釋又寶慶初蕭觀復述度人內義丹旨是皆研心究竟者也僕以緣遇師真授以金液大還火符之祕欲與世人盡諳此道乃注道德經金剛經述金丹大要既而參以道用世法分注此經又引前哲所論善者證之庶幾規禍福者知勤誦而向善超造物者知修行而登真噫世人皆知悅生而惡死既知惡死則必思所以逃其死者今乃不然知惡死已却埋身於名利嗜欲之場而不知悔是愈急其死也既知悅生必思所以求其長生久視之道者今乃不然知悅生已却不求真師指示長生返還之旨唯只瞎走傍門盲行邪徑者是愈促其生也山間林下城邑智人既知誦念此經宜求經中有金丹永世之捷徑者蓋太上以靈寶之道而度人者直欲世人行此道也果能進修勤行則上遊
