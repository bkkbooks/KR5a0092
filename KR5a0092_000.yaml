front:
  text: 元始无量度人上品妙經註解序徃一太乙含眞氣實爲妙道仙宗靈寳度人經是謂洞玄上品生育天地闔闢陰陽造化得以運行元功恃而溥博昭懸日月旋斡星辰普殖神靈化生品彙者也在道德經以無爲爲先有爲爲次上德者無爲也下德者有爲也上仁者無爲也上義者有爲也此度人經則以有爲爲首無爲爲終玄座空浮者有爲也冥慧洞清者無爲也璇璣玉衡一時停輪者有爲也十方肅清河海靜默者無爲也故說經周竟十遍而枯骨成人有功勤上奏諸天則萬神朝禮三十二天三十二帝示祖劫之化生諸天隱諱諸天隱名恐天人之泄慢泄慢則禍及七祖勤行則位登仙翁萬劫不傳上天所寳何爲靈寳氣謂之靈精謂之寳寂然不動感而遂通曰靈上無復祖唯道爲身曰寳氣合而精聚曰上品神交而道合曰度人則知靈寳者精氣也精氣者汞鉛也汞鉛者陰陽也陰陽者離坎也離坎非得有爲之道而旣濟之則何由凝結而成黍米之珠哉厥夫人之初生也以无合有盜竊天地絪緼眞一之氣以冒賦其形也孕毓十月脱胎去蔕日漿夜乳然後形全而神王神全而精粹精盈而至和之氣盛塞先哲云氣全者不思食神全者不思睡精全者不思慾當此之時號曰純陽夫純陽者乾也上士於此而行上德无爲之道内修外功則魔王敬形便得神仙謂夫末學道淺不樂仙道是以保眞者少迷惑者多廼於醉生夢死之場熾于慾海愛河之地則向來所禀天地眞一之氣潜奔而寓于坤矣繼此而往坤乃乘乾之一陽而爲坎乾因坤破虧一陽而爲離審兹慾從愛起愛逐情生情隨境亂况夫喜怒哀樂慮嘆變慹日夜相代乎前與物相刃相靡寧知物來无窮我心有際之説乎是以仙道難固鬼道易邪運應滅度身經太陰輪迴无期可勝悲憫至人仙子獲遇眞師頓悟人道者心諒不由他却於一氣潜虧之時早行靈寳度人之道以復之且復者何也即下德有爲之道即上義爲之之道即元始懸珠之道即流戊就己之道即降龍伏虎之道即煉鉛乾汞之道即金液歸眞形神俱妙之道也領悟到此方信地藏發泄之妙金玉露形之功全其本年咸得長生過度三界飛升太空皆分内事况積德而建功者乎尋詳是經元始天尊於龍漢初天地始分玉宇且出乃撰此經時以紫筆書于空青之林宇皆廣長一丈以授玉晨道君玉晨授玄一眞人玄一授天眞皇人皇人細書其文以爲正音祕而藏之軒轅時皇人與太清三仙王會峨嵋山黄帝再拜問道皇人授以五牙三一之文并度人經上卷黄帝修之上仙後帝嚳於牧德臺皇人授以本章玉曆章西漢元封間西王母以上卷并二章授武帝始成全經東漢時太上降授干吉增靈書上篇并太平經一百五十卷桓帝時老君降蜀授天師度人北斗諸經籙千餘卷吴時太極眞人於會稽上虞山授太極左宫仙翁葛玄度人經增靈書中篇鄭眞人思遠授抱朴子葛洪經本又增靈書上下篇太極眞人後序即今之全本晋王纂遇道君賜此經及諸經數十卷元魏時寇謙之居嵩山修行感太上授此經并餘經六十餘卷經之流世人知念誦擣祈而不知有還丹久視之道存自政和御註繼以薛幽棲嚴東啓成玄英李少微諸家註釋又寳慶初蕭觀復述度人内義丹旨是皆研心究竟者也僕以縁遇師眞授以金液大還火符之祕欲與世人盡諳此道乃注道德經金剛經述金丹大要既而參以道用世法分註此經又引前哲所論善者證之庶幾規禍福者知勤誦而向善超造物者知修行而登眞噫世人皆知悅生而惡死既知惡死則必思所以逃其死者今乃不然知惡死已却埋身於名利嗜慾之場而不知悔是愈急其死也既知悅生必思所以求其長生乆視之道者今乃不然知悅生已却不求眞師指示長生返還之旨唯只瞎走傍門盲行邪逕者是愈促其生也山間林下城邑智人既知誦念此經宜求經中有金丹永世之捷逕者蓋太上以靈寳之道而度人者直欲世人行此道也果能進修勤行則上遊
