front:
  text: 太上洞玄靈寶無量度人上品妙經注卷上
  hash: sha256:4226c74e81bc372b9bef53219bd26d3aa3a78fe4b28d2e7a4010dc22cf6ca784
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0092_HFL_001-001a, image: hfl/0045/0045-014.png}
body:
  text: 上陽子陳觀吾注上陽子曰大唯道最大上天地獨尊洞無所不通玄其妙難迷靈變化莫測感而遂通寶難得之物人所珍愛無量豈可猜量度人從凡入聖上品天下無雙妙含靈育秀之物經河筏天梯之用總而釋曰最尊極貴通靈變化先天真一成丹之正道如上乃為大根上士者說是謂道用夫經有道用有世法道用者依之修行而登仙世法者精勤誦念而求福若以世法釋之則大上者巍巍尊高之稱洞玄乃三洞品級有洞真洞玄洞神謂元始洞達至真玄一之道靈寶者此玉宸道君受元始玄一之氣化生位尊靈寶之號無量度人者元始自浩劫以來化生諸天生成萬有世人由之而得度者算喻莫及上品者三十六部萬八千篇道藏四十萬卷之多必以此經為首妙者不可名言經者道之正路此世法之說也若大修行人道用與世法並行以道用而隱世法以世法而全道用是為性命兼修世謂釋氏修性道家修命雖賢與智亦執此說又豈知此經性命混融形神俱妙哉上陽子只得泄露天機將此經性命體用題而出之太性之體命之應即造化主宰上命之體性之用能化生諸天洞真性之所同玄工用之隱奧靈乃性之變化寶乃命之所産無量非泛常能知度人人須人而度上品天下無二道同類易施功妙者一陽初動萬物皆春經者有物有則修行之徑如此暴露豈不直截混元實録老君於龍漢劫分身教化出真文於中天大福堂國南極赤明國東極浮黎國西極西那國北極鬱單國五國之內皆禀靈寶之教西化胡王王問曰何謂道老君曰乃太上靈寶生於天地之先大無不包細無不納天得之以清地得之以寧神得之以靈物得之以生人得之以形人若修之便得神仙飛步玉京故曰太上洞玄靈寶無量度人上品妙經頌曰太上端居太極先本於父母未生前度人須要真經度若問真經癸是鉛道言昔於始青天中碧落空歌大浮黎土受元始度人無量上品元始天尊當說是經周回十過以召十方始當詣座天真大神上聖高尊妙行頁人無鞅數衆乘空而來飛雲丹霄緑輿瓊輪羽蓋垂蔭流精玉光五色鬱勃洞煥太空七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山海藏雲天無浮翳四氣朗清一國地土山川林木緬平一等無復高下土皆作碧玉無有異色衆真侍座上陽子曰以世法言此乃叙說經之由以道用看渾是先天玄一大丹之妙道言老子曰有物混成先天地生字之曰道夫道本無言假言以顯道之用故曰道可道非常道以世法釋則道君演說經義直曰道言以道用釋則道自溟幸之前而成太極太極在竊冥之中而分陰陽陰陽既成形之後而為性命性命當發越之際乃曰神氣神氣因渾沌之破則名鉛汞鉛汞行戊己之門是為玄牝故玄牝為天地之根此之謂道遵道而用斯之謂言故經首直曰道言昔於始青天中昔太極之先始青天萬物之始碧落空歌造化之端大浮黎土物所由産受元始度人無量上品行此玄一大丹之事此以道用言若世法義昔當初始青天乃東方第一天在種民天之上有碧霞遍滿是云碧落天中有氣蕩為神風振響若空洞之歌其下有國曰大浮黎內義曰大浮黎土示人造化之端物生於土終於土陰符經云火生於木禍發必尅知之修鍊謂之聖人木中有火發而不制則灰飛煙滅無復本性能制之者雖火刑木燼可聚而為土則本性存矣始青天木之方也碧落空歌火之象也大浮黎土土之本也土為還丹之基還丹者返本還元之道經曰致虛極守靜篤萬物並作吾以觀其復夫物藝藝各歸其根歸根曰靜靜曰復命此乃返還之理在易之復卦曰復其見天地之心乎天地者陰陽之體心者明其所用天動地靜陽動陰靜天動極而陰生地靜極而陽生蓋剝於上而復於下動靜消長所以見其心人亦然爾復之為卦一陽在五陰之下其體震下坤上震木者始青之天木生火碧落空歌也火生土故坤土者大浮黎土也土為造化之本而土生金名為空氣金胎實先天之祖氣也元始天尊元玄也始一也天一氣之最上尊萬有之極稱道用即法身之祖氣亦云本來面目不壞元神故丹經云元始天尊即是我當說是經當其時而說之道用是經即真鉛也老君謂文始先生曰子能知一萬事畢又曰一者是鉛鉛為君二者是汞汞為臣若鉛不真其汞難親若鉛是親不失家臣周回十過以召十方世法天尊說經招真召靈周者遍告回者普召告召理行十方詣座道用則丹有九還十月之功始當詣座者金丹就室也大修行人入室下工追二氣於黃道會三性於元宫回七十二候之要津簇三千六百之正氣豈非天真上聖無鞅數衆攢歸丹鼎輻凑金胎豈非乘空而來以神合氣以氣鍊形豈非飛雲丹霄羽蓋垂蔭金華耀彩銀精吐輝豈非流精玉光五色鬱勃洞煥太空者乎以世法言則天尊神通感召奚止如是哉七日七夜夫天地大化十月純陰而無陽至十一月屬子子雖有陽而未回又七日而陽初復此天地之陰陽也月遇十五而圓至二十七夜月中黑而無陽至後月初三申時月之一陽復生於庚此日月之陰陽也皆以七而復天一生水地六成之此五行之七數也金丹之道攢簇之數一時有六候一候管五日當采藥之時止用一候半亦七日七夜易曰剛柔者畫夜之象也先賢曰剛柔一氣之往來也人之呼吸一氣之往來也夫一吸一呼是為一息一息之間分陰陽呼而明為陽吸而晦為陰七竅之呼七日也七竅之吸七夜也金母功行天機不動神疑目定脉住心停故云七日七夜諸天日月星宿璇璣玉衡一時停輪息不出入即神鳳靜默氣無升降為山海藏雲妄緣俱淨猶天無浮翳六根大定曰四氣朗清道用至此乃見性命混融之妙矣一國地土世法即浮黎土道用則一身也人以身為國以精為民以氣為主以神為帥山川林木具在身中真靜湛然是即緬平一等無復高下矣性如玉之瑩潔何異色之有哉內義曰土性情也性虛化而生神存於室中曰戊土氣感激而有情攝於釜內曰已土戊己既交之後神怡氣寂性復情冥如色之碧無瑕如玉之真不雜故曰土皆作碧玉無有異色也心目內觀真氣三魂歸體七魄歸真心君一寧萬神聽命故云衆真侍座此皆道用之有為若以世法義釋則天尊威力感化天神地只日月星宿隨機赴感景象如此也頌曰碧落空歌最妙音大浮黎土向坤尋流精洞煥神風靜湛寂微陽鍊五陰元始天尊玄座浮空五色師子之上說經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰說經二遍盲者目明說經三遍喑者能言說經四通跛痾積逮皆能起行說經五通久病痼疾一時復形說經六遍髮白返黑齒落更生說經七遍老者反壯少者皆强說經八遍婦人懷妊鳥獸含胎已生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人是時一國是男是女莫不傾心皆受護度咸得長生上陽子曰以道用言元始天尊元神也紫清白真人云此神即非思慮神可與元始相比肩是也內義曰玄座神室也空浮法身也五色乃妙化之氣師子印心知元神在室運心攝氣法身虛寂心知明妙神之御氣心以象師得非天尊道相乎又豈非我之真性乎則玄座空浮乃湛寂真靜而又常應常靜人之最難降者心也性也經云人神好清而心擾之心好靜而欲牽之神即真性心靜而神自清入室之工降心如降猛獸前哲以鉛汞而比龍虎者謂其難制伏也純陽云溫溫鉛鼎光透廉幃造化爭馳虎龍交媾進火工夫牛斗危况師子為百獸之王空浮而坐于其上稍有怠慢亦危之甚東海青元真人曰必先降伏而座其上猶虛其心外其形道斯能應始為超脫之本說經一遍諸天大聖同時稱善夫修玄一至真靈寶大還丹之士萬聖敬護諸天所崇魔王保迎鬼神欽仰况得預經座豈不稱善以道用言則行道一遍身中之神皆得快暢也一國男女聾病耳皆開聰二遍盲者目明三遍喑者能言此以世法觀之似淺若以道用曉之其理最切何以故一切常人不能靜聽養氣收視存神故耳為聲所惑目為色所亂口為味所役久而不悟終亦必盲聾喑啞至矣老子曰五音令人耳聾五色令人目盲者是也大修行人聽於無聲久而愈聰視於無形久而愈明口不雜味久而愈爽况入室之際我之五官當云何而恐懼戒謹哉魏真人曰耳目口三寶閉塞勿發通真人潛深淵浮游守規中者此也四遍跛痾積逺皆能起行比世人不知修道如跛者不能行痾者纏也積習也之及也以其下愚纏於俗染積習所及故爾今言能起行者能起志而修行也五遍久病痼疾一時復形世有信道之士心多不堅不信道之人其懷不信之心反堅如金石百計不能回其心使之信道此為久病痼疾忽然一旦信道行之不疑是謂一時復形說者有以坎為耳而開聰離為目而目明又有以震驚為開聰離麗為目明何不超脫夫經之流世實存道爾非真履的踐之器識奚可以語是哉六遍髮白反黑齒落更生血盛則髮益精裕則齒堅七遍老者反壯少者皆强若先天玄一之氣復則老者反嬰而反壯矣若至真之氣全則少者皆强矣老子曰比於赤子骨弱筋柔而握固未知牝牡之合而䘒作豈非少者皆强之義八遍婦人懷妊鳥獸含胎已生未生皆得生成說經九遍地藏發泄金玉露形說經十遍枯骨更生皆起成人此道用與世法兩存世法則依經云云不必復贅道用則修金液還丹之士未得先天一氣則一身皆陰若離中虛豈不謂之婦人乎紫陽真人曰日居離位翻為女坎配蟾宫却是男者此也既得金液歸鼎上下則守以朱雀玄武左右則守以白虎青龍豈非鳥獸含胎乎皆得生成者金鼎之胎完氣足地藏發泄金玉露形者形神俱妙枯骨更生皆起成人者真人出現身外有身千百億化也內義曰鳥獸含胎者砂含汞質象類懷胎汞遇鉛而凝結氣遇形而混合已結之氣日益壯盛發生之氣又復混凝不隨物散長養聖胎故曰已生未生皆得生成又九遍者地四生金天九成之還西兑方為金乃坤兊合而金成於土蓋鉛歸土釜而成寶也參同契曰金來歸性初乃得稱還丹所謂一氣還元也夫天一生水始因空氣金胎而生未見金質地四生金猶為化機至此則還元復性居於中宫是為丹體而有玄象中宫土也土為地金母居其中故曰地藏發泄金玉露形漢天師序金液神丹經云神仙之趣要妙之言無理之至理不然之大然已具載於淵宗非一毫之所宣太上亦復暢此冲虛妙道者也是時一國是男是女莫不傾心一國乃一身男女即陰陽傾心者以類相感猶言先天之氣與後天氣合而成丹功圓氣足故云皆受護度咸得長生如上所釋皆屬道用若從世法不釋已詳頌曰玄座空浮五色師盲聾喑跛病皆離地藏泄時金玉露飛空奪得錦標兒道言是時元始天尊說經一遍東方無極無量品至真大神無鞅之衆浮空而至說經二遍南方無極無量品至真大神無鞅之衆浮空而至說經三遍西方無極無量品至真大神無鞅之衆浮空而至說經四遍北方無極無量品至真大神無鞅之衆浮空而至說經五遍東北無極無量品至真大神無鞅之衆浮空而至說經六遍東南無極無量品至真大神無鞅之衆浮空而至說經七遍西南無極無量品至真大神無鞅之衆浮空而至說經八遍西北無極無量品至真大神無鞅之衆浮空而至說經九遍上方無極無量品至真大神無鞅之衆浮空而至說經十遍下方無極無量品至真大神無鞅之衆浮空而至十遍周竟十方無極天真大神一時同至一國男女傾心歸仰來者有如細雨密霧無鞅之衆迮國一半土皆偏陷非可禁止於是無始懸一寶珠大如黍米在空玄之中去地五丈元始登引天真大神上聖高尊妙行真人十方無極至真大神無鞅數衆俱入寶珠之中天人仰看唯見勃勃從珠口中入既入珠口不知所在國人廓散地還平正無復欹陷元始即於寶珠之內說經都竟衆真監度以授於我當此之時喜慶難言法事精悉諸天復位倐欻之間寂無遺響是時天人遇值經法普得濟度全其本年無有中傷傾土歸仰咸行善心不殺不害不嫉不妬不淫不盜不貪不欲不憎不𡜍言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平經始出教一國以道預有至心宗奉禮敬皆得度世上陽子曰此道用與世法兩存世法則天尊說經感召十方無極衆真東方梵監須延天等震宫卯位是無鞅衆南方鬱單無量天等離宫午位西方靈化梵輔天等兊宫酉位北方洞元化應聲天等坎宫子位東北高虛清明天等艮宫寅方東南波羅尼密不驕樂天等巽宫巳方西南寂然兜術天等坤宫申方西北上上襌善無量壽天等乾宫亥方上方九霄上清玉真三十六天等下方無色界色界欲界三十二天等以至三元九地無鞅之衆俱會始青天浮黎土聽元始天尊說經也十者極數而言以道用則十者是天地生成之數戊己二土合而成十天地合而萬物交陰陽合而萬物生鉛汞合而金丹成當採藥之時簇三千六百之正氣回七十二候之要津分三百八十四爻聚五星二十八宿鼓二十四氣之陽火行六十四卦之陰符三魂衛形七魄歸體身中萬二千神一時聽命是為十方無鞅之衆浮空而來一時同至男女傾心歸仰是陰陽二氣混合細雨密霧乃真氣薰蒸參同契曰金砂入五內霧散若風雨土皆偏陷土印戊己二土戊己是玄牝之門采藥之際龍爭虎鬥金木間隔一失防遏必致走喪蓋得之在我則彼失我失則彼得故云偏陷當是時也唯至聖神人練己純熟方能禁止其偏陷之失寶珠如黍之小容衆真勃勃而入以世法見豈不神通道用視之無黍米大元始懸一寶珠大如黍米在空玄之中去地五丈此明道用寶珠空玄神與道合去地五丈地皆言土土即戊己金丹從戊己而結既已結丹離而去之戊土已隔西天己土尚離五丈此須口傳不可顯露回視五丈之下皆五濁惡世矣說者以寶珠去地五丈比心去脾五寸為喻是最愚謬或以寶珠為性五丈為五行之數或以丹田到玄關為說豈知祖氣成化胎仙之妙元始登引衆真俱入寶珠元神一定萬神總歸契虛合無升玄入妙青元真人曰道之微妙本於虛無天真之身豈有容礙不免同時混殽所以懸珠應變示無形者還於無物登者起而舉行引者指示化導天人仰看成真得道者隨入珠口若天人有纍未可偕行既入珠口不知所在此皆元始示現神化金丹之道從無入有以有歸無混合百神於一心斂藏萬有於一息則天人異見豈得而知珠內妙化哉說經都竟衆真監度以授於我紫陽真人云白虎首經至寶華池神水真金又云相吞相啖却相親始覺男兒有孕諦觀此語豈非說經都竟乎又豈非以授於我乎當此之時喜慶難言情性兩下圓明今日欣慶受度法事粗悉諸天復位法事者有為之事經云上義為之而有以為大藏般若云丹成之後委之而去則諸天復位其理可見諸天既已復位則達磨亦入少林冷座這般指出了諸學仙子寧不為之慶快倏欻之間寂無遺響倏欻言至疾也凡息為略一略有五倏欻一倏欻間不容貶眼此世法之言爾若道用則倏歘之間四字莫容易看過一字須要惺惺始得夫煉金液大丹其事最疾故丹經以年中取月月中取日日中取時時中取候候中取刻蓋攢七十二候於一日則一時分為六候煉丹之頃不用二候猶一時不要半箇時已得還丹也故須菩提問世尊云是事疾否世尊云是事甚疾而遺響之義尤須詳明這箇寂字受用不盡是時天人遇值經法普得濟度此當作道用釋天人當分兩說經法亦是兩義何以故蓋有材者施材法者施法又有藥者施丹聞經者施法是以經法兩明法材雙扣皆云兩者謂之天人謂之經法則天人全乾坤之體經法全大丹之用各全其本年而咸無中傷內義曰得之者知其神而愛之明其氣而寶之方謂之全傾土歸仰咸行善心不殺不害者當以世法釋人無有不善皆因物欲所蔽昧其本來是以惡日長而善日消也今者得遇經法則皆回光返照返本還元而行其本來之善心矣書云聞其聲不忍食其肉夫念想見聞皆謂之殺折傷一切曰害毁人良能曰嫉恨彼富貴曰妬不絶妄想曰淫取於非義曰盜好愛無厭曰貪見物起念曰欲謗毁勝己曰憎疑忌正直曰𡜍虛言詐誕曰華綺語不規檢曰惡聲十惡之業唯淫欲為諸業之首修行之士先當屏絶長春真人對太祖皇帝且以欲為第一戒太微靈書以欲為十敗之首修行之法無他但能真實絶欲餘皆易事耳世以絶欲為甚難者此乃愚癡之見却不知其法甚易但人自未試也試者印煉己之事初學之士試於無人之境獨行獨卧仍戒飲酒日則以丹經常玩夜則以清淨存心眼前既無境亂內則妄念悉除稍有魔障愈堅其心外則不令飢渴內則常加滋補如此半年一載待其精氣內固則自不思欲矣若欲念未除是精尚不全更當固之丹經云神全者不思睡氣全者不思食精全者不思欲直至言也精既全又能長保長守方可以煉還丹人試行之即見其效蓋無人境處習煉己者謂之小隱小隱若定方可大隱市廛儻外絶境而內念不除見境印動此非真履實踐皆言清行濁總為地獄種矣夫絶欲之士上聖每加陰護鬼神踖中欽仰丹道自然成真昔紫虛元君與茅真君校勘天下真仙得失之事其中頓落者四十七人復上者才二人勘其欲心未絶故也欲罪若無十業俱弭齊同慈愛物我兼容異骨成親自利利他國安民豐欣樂太平國身也民身中之精氣也普老君授干吉太平之要曰夫人天付之神地付之精中和付之氣人能寶精去欲固氣愛神內則身得長生外則國致太平况有諸內必形於外了性則身清淨了命則丹圓成內則性命雙修外則善行彰著福國安民而欣樂太平矣經始出教一國以道預有志心宗奉禮敬皆得度世內義曰人禀道氣而生是心寧無有乎蓋由耽著幻妄迷昧昏蒙一遇經法此心復明謂如今之指出丹體乃本來之物非昔無而今有雖得之於聞道之後實先有於聞道之前故曰預有志心青元真人曰宗奉此經以求濟度禮者禮事此經如父如母如師如長畏愛之間惟恐慢易敬者敬重此經如金如寶如珠如玉愛惜不捨惟恐失之既盡四心皆獲度世而長生矣頌曰寶珠如黍在空懸上聖高尊總現前珠口且容元鞅衆方知經力妙玄玄道言元始天尊說經中所言並是諸天上帝內名隱韻之音亦是魔王內諱百靈之隱名也非世之常辭上聖已成真人通玄究微能悉其章誦之十過諸天遙唱萬帝設禮河海靜默山嶽藏雲日月停景璇璣不行群魔束形鬼精滅爽回尸起死白骨成人至學之士誦之十過則五帝侍衛三界稽首魔精喪眼鬼妖滅爽濟度垂死絶而得生所以爾者學士穢氣未消體未洞真召制十方威未制天政德可服御地祇束縳魔靈但却死而已不能更生輕誦此章身則被殃供養尊禮門户興隆世世昌熾與善因緣萬灾不干神明護門斯經尊妙獨步玉京度人無量為萬道之宗巍巍大梵德難可勝上陽子曰天尊說經中所言以世法釋三十二天帝諱即諸天上帝內名隱韻如青天魔王巴元醜伯等即魔王內諱無英公子桃康合延之類即百靈隱名青元真人曰夫靈寶為道氣之徂度人為萬法之先元始含藴妙道出法度人流散文言制成音律非下世文章之比中下之仙不可盻其篇目惟上聖真人深造道妙始能通亥究微以道用釋是經即還丹也老子曰名可名非常名經中所言上帝內名隱韻之音者太乙真人破迷歌云如何却是道太乙含真氣太乙豈非內名乎先哲云乾坤之內宇宙之間中有一寶祕在形山此即隱韻之音正陽真人曰生我之門死我户此即魔王內諱伯陽真人曰真人潜深淵佛祖曰坐上有一無位真人此即百靈之隱名如上皆至玄甚微非上聖之士躬親踐履修行成真得道常人烏能通達而究竟哉通究悉三字之義奚可略而不詳通者通其經意究者究其丹道悉者悉其火候只此三事一理就中多少玄微且如丹經所言藥之內名者日魂月魄庚虎甲龍水銀朱砂紅鉛黑錫黃芽白雪姹女嬰兒金液流珠華池神水交梨火棗鳳髓龜精此皆藥之內名又如乾坤鼎器坎離匡廓玄關一竅太乙神爐神室黃房混元丹鼎懸胎偃月金鼎玉燼此皆鼎器之隱諱又如陰陽火候太易子癸復震屯蒙母隱子胎刀圭媒聘攢簇時節情性主賓白黑雌雄朔望弦氣顛倒浮沉抽添沐浴烹煉溫養斤兩爻符脫胎换鼎此皆火候之隱名又如恍惚窈冥先天太極初三成震月現庚申西南得朋首經至寶文武逆順至日閉關擘裂鴻濛鑿開混沌建立鄞鄂創造鼎爐以有入無流戊就己防危社險復命歸根龜息踵音千百億化此皆還丹隱韻之音無非玄一徂氣之妙學者必須明師通玄究微精達深曉是請上聖方能悉其章也誦之十過者槩言還丹之成功道高德隆之喻若其庸人不明說經之義直以念誦十過而妄希求諸天遙唱萬帝設禮如經所言者必無是理若修還丹功成道備則其靈應豈止如是哉內義曰萬帝設禮者莊子所謂淡然無極而衆美從之天地之德聖人之道者也河海比愛河苦海也人心被妄幻所有則愛從情出苦從識至若修金丹要德合天地道同聖真則愛河靜息而苦海淵默矣山嶽藏雲黃庭經曰五嶽之雲氣彭亨印五藏雲氣真人之息深深則五藏氣盈如山嶽之藏雲也日月兩目也景光也神也真人神不外馳目雖視物而凝然不動故曰停景璇璣斗極也人心象之極者旋而不移視而察之乃若不動真人者任其自然心須應物而湛然常寂故曰不行群魔紛紜萬緒惑亂我心既任其自然則應之若無事故曰束形鬼精三尸也三尸不去道必難成能體純素三尸自絶故云滅爽回尸起死白骨成人丹成之士非特獨善其身更宜推功及物濟死度生淨明經云吾丹既成變化自在所不足者上帝之詔未至於是積功以期真命焉吳真君猛起于慶於已亡豈非回尸起死乎至學之士勤苦精進無退轉也五帝五藏之神肝魂肺魄心神腎精脾意此五者若人恬淡則神定魂清意安魄寧精不走失若人躁競則神疲魂濁意亂魄散精遂潰耗夫人非不欲安而壽而日應酬神稍疲倦則三尸九蟲作我蟊賊是以丹田之真為其所擾精進之士必尸蟲消絶五藏之神各安其職故曰侍衛也三界三尸也乃人身三部陰濁昏邪之氣屬三徒之界上尸彭踞居人頭中尸彭躓居人腸下尸彭蹻居人足凡人嗜欲貪淫種種不善皆尸鬼所使庚申等日則詣天曹言人罪過毫髮不遺欲人速死彼則欣躍葛稚川曰子能絶三彭之仇乎古仙詩曰窮盡世間無限法除非丹藥殺三尸紫陽真人曰由來庚甲申明令殺盡三尸道可期此乃銷惡成仁化頑從善被我制伏護我修行故曰稽首也魔精喪眼鬼妖滅爽魔精有隻眼而形不可見鬼妖有精爽而體不具一切常人醉生夢死皆為妖魔所害而反以為樂者何也六欲七情之未除故也大修行人七情俱忘六根盡淨則魔精喪其瞎眼而變為慧眼鬼妖滅其精爽而化出神通上根之器精進堅固而行之者雖垂死將絶猶可延其生况年壯而氣裕者乎青元真人曰萬緣紛起是內魔災苦所逼為外魔內魔不絶是曰精七情六欲是謂鬼惱亂顛倒障我道德此所謂妖至學之士心無退轉彼皆不得而為此妖魔之障矣初學者雖無內想然外境卒至此心印亂奚可煉丹故經云爾者學士穢氣未消也淫欲之人不能清淨自知體有穢氣若見修行之人急當回避毋觸忤其真氣以招殃禍而初學之人欲念不除則體亦穢氣不能洞達真道又焉能召制十方雖積小善寸功未能臨制上天七政之辰蓋金丹之士所行與天地合德與日月合明天罡所指斗極居前也若修丹未成則威未制天政此名初仙若未能修行而積德重厚此名地仙其德止可伏御地只也束縛魔靈者以其不明先天妙道唯存想行符役驅神鬼又常吸呼陰户鬼氣是名鬼仙如上積行不倦亦可延壽故曰但却死而已不能更生此形體以久視長生儻一旦不行禍難即至也知此道而不行又輕與人妄論是謂輕誦此章身則被殃內義曰金丹之要全在精勤調燮精則必明勤則必成首則勤於采取次則戒於持盈以俟鼎器圓成藥物全備則運符進火添抽汞鉛時晷相符節候無爽故得陰陽氣足離坎珠圓神化成真長生久視若乃情躁心怠妄作謾為緯候相差符節不應則隆冬大暑盛夏嚴霜姹女逃亡赤龍奔逸神精既失金液難求氣索體羸形衰身殁供養尊禮虔心供養日夕尊禮真仙聖師而又修行篤敬外則宅舍昌盛內則身心安寧動與吉會神明護門高象先日夕思真不覺魂升玉京上帝憐之命西華太乙夫人指示金丹訣其篇有曰乾坤陰陽之門户乾道男兮坤道女時人不識真陰陽茫茫天地尋龍虎觀此則門户宅舍在吾身也斯經尊妙獨步玉京七籖經教部云夫三洞者是一乘之妙旨三景之玄言了則上聖可登悟則高真斯陟龍章鳳篆顯至理之良詮玉簡金書引還元之要術况斯經為三洞之冠故云獨步玉京從古至今仙真上聖未有不由是而修證者萬法千門靡不出此巍巍蕩蕩非可以名言思議頌曰內名隱諱不堪論無位真人號獨尊了得內名須受用方知劫劫鎮長存道言凡誦是經十過諸天齊到億曾萬祖幽魂苦爽皆即受度上升朱宫格皆九年受化更生得為貴人而好學至經功滿德就皆得神仙飛升金闕遊宴玉京也上學之士修誦是經皆即受度飛升南宫世人受誦則延壽長年後皆得作尸解之道魂神暫滅不經地獄即得返形遊行太空此經微妙普度無窮一切天人莫不受慶無量之福生死蒙惠上天所寶不傳下世至士齎金寶效心盟天而傳輕泄漏慢殃及九徂長役鬼官侍經五帝玉童玉女各二十四人營衛神文保護受經者身上陽子曰十過以成數言經功圓成諸天齊到青元真人曰億曾萬徂乃無始以來捨身受身所育父母乃租乃先幽滯魂靈久拘苦爽悉獲受度上升朱宫南方丹天世界有南昌上宫宫有朱陵之府府有流火之庭乃鍊化度仙之所獲超升者經由此宫受三火大鍊鍛鍊五濁穢形以王眸之光鍊其氣質以黃華之水灌蕩尸形然後內孕靈真隨其報化而遂更生鍊度之格有三上學三年受度中智九年下學二十四年格皆九年者總以中格言之此世法釋也若以道用當求於身十過者則十月之理諸天齊到者萬神混歸元一億曾萬祖乃父母假合之物幽魂苦爽印有身之後昏濁之氣皆印受度上升朱宫乃鍊化假合昏濁之氣超入清淨光明之域受化更生得為貴人謂融鍊假合昏濁之氣俱化陽神更生真氣萬神為一神萬氣為一氣長養聖胎也學士到此地位已得神全氣足延年長生所謂仙者尚未可言而好學至經功滿德就皆得神仙若進修內功成就外行方可言仙內功者火候脫胎神化之道外行者濟人利物如漢天師區别人鬼葛仙翁濟度幽魂許真君誅剪蛟妖是矣經云學者雖守道不作功德亦不能得道若內丹成積修外行則功滿德就飛升金闕逰宴玉京真不虛也上學之士修誦是經皆印受度飛升南宫上學者聞道勤行也老子曰上士聞道勤而行之蓋勤則有功即飛升南宫也世人受誦則延壽長年後皆得作尸解之道世人乃常俗之流紫陽真人曰大丹之法至簡至易雖愚昧小人得而行之亦躋聖位尸解有四種一者兵解若嵇康寄戮於市淮南託刑于獄二者文解若次卿易質於履長房假形於竹三者水火解若馮夷溺於大川封子焚于大樹四者坐解視其已死而足不青皮不皺目光不毁屈伸從人名太陰鍊質肉過百年不朽更起成人真誥云尸解仙不得御華蓋乘龍登太極但不死而已故云魂神暫滅不經地獄印得返形遊行太空也說者謂尸解者曰瑩骨輕精血不變投其尸于名山大川百年之後化生珠玉也此經微妙普度無窮一切天人莫不受慶以道用釋此經即至寶也即金液也微妙即白虎也即兩七也崔真人入藥鏡兩七聚輔翼人以此經微妙之功順則生物逆則成丹廣濟有情普度無窮矣一切天人大修行者以天人分兩義猶金丹分龍虎二物莫不受慶天人以法藥兼施故皆受慶經功圓滿丹道成真豈特身被長生之恩偕祖彌蒙超升之惠上天所寶不傳下世此從世法釋青元真人曰上真朝奏必嘯詠此篇天實寶愛不傳下世因後聖君堅請以保甲申洪災所以聖聖相傳不及凡俗唯至士齎金寶效信質心盟告諸天方可傳授何則人之愛者唯金寶金為堅剛之物太上設此使人捨己所愛破慳吝心以此捨心回向表其心誠堅如金石若輕泄妄傳殃及九祖矣侍經五帝玉童玉女各二十四人此道用釋經者祖氣也五帝妙化五行之氣童女二十四人是合內外二景真神真氣營衛丹體保護受經圓成大丹也昔許旌陽鍊還丹乃感上帝遣五仙童女持劔而下旌陽日與之戲劔後乃成道豈非保護受經者身乎頌曰上天所寶不輕傳若得親傳可上天金寶效心何所貴此經微妙福無邊道言正月長齊誦詠是經為上世亡魂斷地逮役度上南宫七月長齊誦詠是經身得神仙諸天書名黃籙白簡削死上生十月長齊誦詠是經為國王帝主君臣父子安鎮國祚保天長存世世不絶常為人君安鎮其方民稱太平八節之日誦詠是經得為九宫真人本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝司迎萬神朝禮名書上天功滿德就飛升上清上陽子曰如世法則正月長齊誦詠是經正月為一歲之始四孟之首乃天官上元大慶之月精思不替曰長守心戒慎曰齊是謂正月長齊口念聲揚曰誦行坐長吟曰詠是為誦詠是經青元真人曰正月為四始之首天地通泰萬物更生之時乘天官考校之格長齊誦經度上世亡魂斷絶地司連逺之苦度上南宫也道用則為進火之月採藥之時皆為身中修行下工之㫖內義曰正月屬寅修丹採藥以寅申為起伏之候寅乃陽起之候欲於甲時行功則於寅時先守以至甲時施用長齊者清心也誦經者攝氣也清心攝氣是為採藥上世亡魂乃身中積陰之氣陽氣雖從子上發生一陽在五陰之下至於寅時猶陰陽相干陰上陽下鬱而未暢故曰逺役至于甲時以法薰蒸陽氣奮發上騰入于離宫得不謂之斷地逺役度上南宫乎蓋經中所言朱宫或言南昌上宫或言朱陵或言南宫者皆離宫也離必以坎為應故張真人曰取將坎位中心實點化離宫腹內陰是也七月長齊誦詠是經身得神仙七月屬申乃陽伏之候欲於庚時行功則於申時先守至於庚時運汞投鉛鼎中成寶亦名采藥亦鑄鼎器陽氣日盛陰氣日消所謂純陰鬼也純陽仙也陽氣既壯即得仙之漸功滿氣足神化脫胎真人出現故曰身得神仙得道之士酆岱落其死籍移注仙籍膺圖受籛乃獲上升故曰諸天書名黃籙白簡削死上生也十月長齊誦詠是經內義曰采藥足備鑄鼎圓成預先十月入室調和神氣去冬至十五日為始謹存神於腎間謂之築固靈根使根源本始神氣俱生身猶國也神為身之主氣為神之臣神滿氣盈百骸俱理丹成質蛻久視長生骨肉同飛形神俱妙一如經之謂矣八節之日誦詠是經得為九宫真人八節八卦也入室運符進火以冬至日子時為首起火神存在腎陽火運行其神隨逐而進腎中根也神室帶也自根至帶根帶相運結胎成果一舉三時自子至丑自丑至寅金火逼逐歸還神室金丹漸結應冬至立春節屬坎艮卦至卯時沐浴辰時進火至巳金火逼逐還至髓海應春分立夏節屬震巽卦陽火至極午時運符至未至申金水推運從雙關鵲橋入室包固玄珠應夏至立秋節屬離坤卦至酉沐浴戌亥運符真氣歸源一陽來復應秋分立冬節屬兊乾卦周而復始循環不已蓋促一年之功於一日之內以應八節凡此運用陽火陰符皆歸中宫長養聖胎十月氣足寶鼎功成脫胎神化是為真人夫八卦環列外實中虛丹體居中易曰八卦成列象在其中此其所以為九宫真人也又世法釋八節之日是太乙司命領諸官吏紀録世人罪福功過有功則舉有過則罰其日誦經乘保舉之格為九宫真人本命之日誦詠是經魂神澄正萬氣長存人身三魂一魂居直本屬宿宫一魂居地府一魂居形內七魄常在身七魄使人昏淫三魂喜人為善遇本命日魂神降體就尸合同循環歸降不絶則生人安隱灾病不生本日清淨身心不酒不色更衣焚香誦經習善坐不睡眠即得魂與魄合魂屬陽魄為陰陰陽相和道氣內降命根堅固身體清安若以酒色昏亂形體魂歸一見去身七步之遠取合不能穢惡衝射魂乃復去七魄因魂不能來合則其陰氣愈盛鼓舞得志肆情恣欲矣若三度昏亂魂不得合魄者則陽表陰旺七魄與陰鬼交通但思淫亂夫七魄各有名曰尸狗伏尸雀陰吞賊飛毒除穢臭肺尸狗主貪伏尸主食雀陰主淫吞賊主偷飛毒妄想除穢敗善臭肺主一切煩惱以其不善故名亦惡人但念頭不正即便引入邪道耽滯酒色游夢衆惡污濁穢行迷亂多睡耗精疲神喪氣多病惱亂至死彼却紓快若於本命之日精心行善誦經行道每每不倦有進無退善功徹天則如經之應感功滿德就則飛升也許真君靈寶淨明度人經法有十毋忘其中最切者毋忘剛潔謂人剛則有守不行淫邪潔則戒行不貪飲食不淫則不損身不精神戒食則不殺物之性命故夫飲酒好色而誦經論道者其罪最重此皆世法釋也若言道用尤有妙理夫本命之日是采藥入室之日是還元返本之日是歸根復命之日故一年之內止有此日此日之中唯在一時一時之間只用二刻是攢族之法也攢七十二候於一日簇三萬六千正氣於一時比一時得六候止用二候誦經鍊丹則一時中尚餘四候别有妙用須在心傳此為本命之日也彭真人曰初則全無形質一如鴻濛混沌之中既經起火蓮符便應元年滋産此為本命之日受氣之初參同契曰冠婚氣相紐元年乃芽滋內義曰若火候畢行脫胎神化之道聖胎存於髓海之中以周星六十日為期本命一周以合周星之數忽然如霹靂之聲天門裂開聖胎脫出凡蛻為仙長生不死魔王保舉諸天奉迎功備德隆飛騰可待李昌齡曰功者日用之謂德者日新之謂茍能閔閔然如農夫之望歲汲汲然如商賈之營財今日積德明日纍功所謂地仙三百善行之只在一年天仙一千三百善行之只在四年第人雖行多至中廢為心不堅故也紫虛元君曰傅先生少好道入焦山石室七年忽遇太極真人授以木鑽使穿一磐石戒曰石透吾當度汝石厚五尺餘傅穿之不息積四十七年石忽穿透太極真人果來度之此心堅之至况誦經行道而精進者乎頌曰三月長齊誦是經諸天上聖為書名人知本命詠經日日用之間顛倒行道言行道之日皆當香湯沐浴齊戒入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武師子白鶴羅列左右日月照明洞煥室內項生圓象光映十方如此分明密呪曰貪羅鬱羅符無蘇陀太冲太極陰陽包和出有入無入生出死鬼神莫測變化自然元始混氣玄中之玄上干有終下洞大淵誦之一遍沉痾自痊煉魂浴魄真陽自全齊戒禮誦萬過飛仙無上祕呪受命綿綿重宣心呪貪羅洞明玉清上極梵氣氤氲分靈布氣降注付身形神俱妙與道合真臣身得道七租飛升垂如金格統攝萬靈急急如元始玄都律令無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人關啓所言今日吉慶長齊清堂修行至經無量度人轉經受生願所啓上徹徑御無上三十二天元始上帝至尊几前畢引氣三十二過東向誦經上陽子曰此經實修行之旨示祖氣之真所以直言行道之日而不曰誦經之日者要知經即丹也丹即道也道即經也非道則不出經非經則不出丹非丹則不成道一定之理更無别途此當以道用與世法通釋夫行道有二有內行道有外行道今先指外行道沐浴齊戒嚴設壇墠燒香誦經步虛朝贊為外行道東海青元君曰以五香水持呪洗身此外沐浴大行梵氣周回十方以至中理五氣混合百神是內沐浴齊者非止禁茹葷穢且先屏絶淫欲然齊心可以防患戒性可以消災入室者入靖絶塵身心專注可與神靈交通東向為長生之方召集生氣叩齒之法左為天鐘右為天磬召仙靈也中為天鼓朝奏上聖心拜者身形不動專意存禮閉目者收視內觀氣乃癡寂青為玄一之氣黃乃元一之氣白乃始一之氣三色之義取法三清坐而存之神明自見內景外境蓊然冥合次存青龍自肝出居左白虎自肺出居右朱雀自心出居前玄武自腎出居後師子白鶴各以六數存之自六腑而出分左右左目化為日輪現紫赤之光九重右目化為月輪現黃白之光七重與身相去三尺光明煥爛射入鼻中通腦後入金華宫結成圓光大如車輪以前青黃白三色相間是為九色圓象以此光明遍照十方然後念前密呪密者不出聲也呪畢關告如前關告畢東向端坐存所出身中四獸等神在前聽法聞經然後出聲琅誦不得雜想接談間斷經法如對君父無少懈怠務在感通徹天也此乃外行道皆世法之當然若以內行道則是道用其事迥别何以故世人看經只看過了不知經中是一大修行教指人行此經中之道故云行道之日而不言看經之日修煉內丹則有入室下工故云入室東向而不言登壇升堂者皆修還丹之說蓋經者敬也天尊說經令下愚之人知所歸敬則心向善不作非為存神養氣可以無灾若不沐浴齊戒更衣入室而誦者反招殃譴若上士至人則行經中之道故云行道之日經即道道即丹修丹方有入室之事故云入室東向凡煉還丹先須煉己存心故云沐浴有道之士先絶欲想故云齊戒愚人不知此事却乃高聲念將過去何謂行道曰修還丹也何謂還丹曰必須師指故純陽真人曰不因師指此事難知老君曰吾非聖人學而得之故學丹必先求師不可妄自猜說既得師傳先須煉己何謂煉己曰去欲念養精氣故純陽曰先須煉己待時既能煉己須結丹友以為外護劉海蟾云箇事非常事尋人未得人陳泥丸云若無同志相規覺時恐爐中火候非既得其侣先尋爐鼎悟真篇云先把乾坤為鼎器次摶烏兔藥來烹既得爐鼎然後擇日何謂擇日紫陽真人曰鉛遇癸生須急採又曰甘露降時天地合即此是也得其日又得其時已須行卦氣故悟真篇曰取將坎位中心實點化離宫腹內陰所以叩齒三十二心拜三十二者還六十四卦也閉目靜思者伯陽真人曰耳目口三寶閉塞勿發通真人潜深淵浮游守規中也身坐青黃白三色雲氣之中者我師緣督子曰先天一氣自虛無中來青氣是汞白氣是鉛黃氣是土以其汞鉛未合藉土合之紫陽自序云追二氣於黃道會三性於無宫攢簇五行合和四象龍吟虎嘯夫唱婦隨方知內外蓊冥四獸羅列日月照明洞煥室內項生圓象如此分明密呪者大音希聲之謂此之謂行道此之謂誦經此之謂內外二景煉丹既就然後關告而身中魂魄皆化為神矣頌曰入室之功却妄情誦經行道早修行傳言玉女先關啓三十二天次第升元始無量度人上品妙經注解卷上
